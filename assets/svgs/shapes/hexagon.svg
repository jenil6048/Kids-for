<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-hexagon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F2F8FF" />
      <stop offset="100%" stop-color="#DCEEFF" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-hexagon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#74b9ff" />
      <stop offset="100%" stop-color="#0984e3" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
    <linearGradient id="side-hexagon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00509d" />
      <stop offset="100%" stop-color="#002b5c" />
    </linearGradient>

    <!-- Leaf Sprout Gradient -->
    <linearGradient id="leaf-hexagon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7BED9F" />
      <stop offset="100%" stop-color="#2ED573" />
    </linearGradient>

    <!-- 3D Base Shadow -->
    <filter id="shadow-hexagon">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="236" fill="url(#bg-hexagon)" stroke="#B3D7FF" stroke-width="6" />

  <!-- Premium Stitched-Sticker Dotted Inner Circle -->
  <circle cx="256" cy="256" r="216" fill="none" stroke="#ffffff" stroke-width="4" stroke-dasharray="8,8" opacity="0.5" />

  <!-- Sparkles -->
  <g fill="#FFD43B">
    <circle cx="100" cy="130" r="8" />
    <circle cx="400" cy="120" r="10" />
    <circle cx="430" cy="330" r="7" />
  </g>

  <!-- Back Limbs (Legs/Feet) -->
  <!-- Legs -->
    <rect x="200" y="285" width="20" height="45" rx="10" fill="url(#side-hexagon)" />
    <rect x="292" y="285" width="20" height="45" rx="10" fill="url(#side-hexagon)" />
    <ellipse cx="200" cy="330" rx="18" ry="10" fill="#2f3542" />
    <ellipse cx="312" cy="330" rx="18" ry="10" fill="#2f3542" />

  <!-- Bubbly Shape Body -->
  <g filter="url(#shadow-hexagon)">
    <!-- Side (3D Offset Layer) -->
    <g fill="url(#side-hexagon)" stroke="url(#side-hexagon)" transform="translate(0, 12)">
      <polygon points="256.0,110.0 338.3,157.5 338.3,252.5 256.0,300.0 173.7,252.5 173.7,157.5" stroke-width="18" stroke-linejoin="round" />
    </g>

    <!-- Front Face Layer -->
    <g fill="url(#front-hexagon)" stroke="url(#front-hexagon)">
      <polygon points="256.0,110.0 338.3,157.5 338.3,252.5 256.0,300.0 173.7,252.5 173.7,157.5" stroke-width="18" stroke-linejoin="round" />
    </g>
  </g>

  <!-- Front Limbs (Arms) -->
  <!-- Arms -->
    <path d="M 175 220 Q 130 220 145 250" stroke="url(#front-hexagon)" stroke-width="12" fill="none" stroke-linecap="round" />
    <path d="M 335 220 Q 375 200 385 170" stroke="url(#front-hexagon)" stroke-width="12" fill="none" stroke-linecap="round" />

  <!-- Cute Sprout on Top -->
  <g transform="translate(256 95)">
    <path d="M0 0 Q-4 -15 -8 -24" stroke="#8B5A2B" stroke-width="5" fill="none" />
    <path d="M-8 -24 C-28 -28 -30 -5 -10 0 Z" fill="url(#leaf-hexagon)" />
    <path d="M-8 -24 C5 -35 22 -20 5 -5 Z" fill="url(#leaf-hexagon)" />
  </g>

  <!-- Eyes -->
  <g>
    <circle cx="215" cy="180" r="18" fill="#222" />
    <circle cx="208" cy="172" r="6" fill="#FFF" />

    <circle cx="297" cy="180" r="18" fill="#222" />
    <circle cx="290" cy="172" r="6" fill="#FFF" />
  </g>

  <!-- Cheeks -->
  <ellipse cx="185" cy="210" rx="18" ry="12" fill="#FF6B81" opacity="0.45" />
  <ellipse cx="327" cy="210" rx="18" ry="12" fill="#FF6B81" opacity="0.45" />

  <!-- Smile -->
  <path d="M225 225 Q256 255 287 225" stroke="#7A1022" stroke-width="8" fill="none" stroke-linecap="round" />

  <!-- Floating Illustration -->
  <!-- Honeycomb & Honey Dipper held by Hexagon -->
    <g transform="translate(120 270) scale(0.9)">
      <polygon points="0,-16 14,-6 14,14 0,24 -14,14 -14,-6" fill="#ffeaa7" stroke="#ffd13b" stroke-width="3" />
      <polygon points="14,14 28,24 28,44 14,54 0,44 0,24" fill="#ffeaa7" stroke="#ffd13b" stroke-width="3" />
      <line x1="25" y1="-20" x2="10" y2="10" stroke="#8B5A2B" stroke-width="5" stroke-linecap="round" />
      <rect x="20" y="-20" width="10" height="14" rx="4" fill="#ffd13b" stroke="#d5a100" stroke-width="2.5" />
      <g transform="translate(30 -35)">
        <ellipse cx="0" cy="0" rx="10" ry="7" fill="#ffd13b" stroke="#2d3436" stroke-width="1.5" />
        <line x1="-3" y1="-6" x2="-3" y2="6" stroke="#2d3436" stroke-width="1.5" />
        <line x1="3" y1="-6" x2="3" y2="6" stroke="#2d3436" stroke-width="1.5" />
        <ellipse cx="-2" cy="-9" rx="4" ry="6" fill="#ffffff" opacity="0.8" stroke="#2d3436" stroke-width="1" />
      </g>
    </g>

  <!-- Bottom Cloud Name Banner -->
  <g filter="url(#shadow-hexagon)">
    <path d="M 130 445 C 120 430, 140 410, 165 420 C 185 395, 235 395, 255 420 C 275 395, 325 395, 345 420 C 370 410, 390 430, 380 445 C 395 460, 375 480, 350 470 C 330 485, 280 485, 255 470 C 230 485, 180 485, 160 470 C 135 480, 115 460, 130 445 Z" fill="#ffffff" stroke="#B3D7FF" stroke-width="4" />
    <text x="256" y="455" 
          text-anchor="middle" 
          font-size="28" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
          fill="#7C5730">Hexagon</text>
  </g>
</svg>