<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-triangle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F4FFF8" />
      <stop offset="100%" stop-color="#EBFDF0" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-triangle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7bed9f" />
      <stop offset="100%" stop-color="#2ed573" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
    <linearGradient id="side-triangle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22ad5c" />
      <stop offset="100%" stop-color="#157a3f" />
    </linearGradient>

    <!-- Leaf Sprout Gradient -->
    <linearGradient id="leaf-triangle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7BED9F" />
      <stop offset="100%" stop-color="#2ED573" />
    </linearGradient>

    <!-- 3D Base Shadow -->
    <filter id="shadow-triangle">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="236" fill="url(#bg-triangle)" stroke="#C5EBCF" stroke-width="6" />

  <!-- Premium Stitched-Sticker Dotted Inner Circle -->
  <circle cx="256" cy="256" r="216" fill="none" stroke="#ffffff" stroke-width="4" stroke-dasharray="8,8" opacity="0.5" />

  <!-- Sparkles -->
  <g fill="#FFD43B">
    <circle cx="100" cy="130" r="8" />
    <circle cx="400" cy="120" r="10" />
    <circle cx="430" cy="330" r="7" />
  </g>

  <!-- Back Limbs (Legs/Feet) -->
  <!-- Legs -->
    <rect x="200" y="285" width="20" height="45" rx="10" fill="url(#side-triangle)" />
    <rect x="292" y="285" width="20" height="45" rx="10" fill="url(#side-triangle)" />
    <ellipse cx="200" cy="330" rx="18" ry="10" fill="#2f3542" />
    <ellipse cx="312" cy="330" rx="18" ry="10" fill="#2f3542" />

  <!-- Bubbly Shape Body -->
  <g filter="url(#shadow-triangle)">
    <!-- Side (3D Offset Layer) -->
    <g fill="url(#side-triangle)" stroke="url(#side-triangle)" transform="translate(0, 12)">
      <path d="M 256 110 C 265 110, 345 265, 350 275 C 355 285, 350 295, 335 295 L 177 295 C 162 295, 157 285, 162 275 C 167 265, 247 110, 256 110 Z" />
    </g>

    <!-- Front Face Layer -->
    <g fill="url(#front-triangle)" stroke="url(#front-triangle)">
      <path d="M 256 110 C 265 110, 345 265, 350 275 C 355 285, 350 295, 335 295 L 177 295 C 162 295, 157 285, 162 275 C 167 265, 247 110, 256 110 Z" />
    </g>
  </g>

  <!-- Front Limbs (Arms) -->
  <!-- Arms -->
    <path d="M 180 230 Q 140 240 155 285" stroke="url(#front-triangle)" stroke-width="12" fill="none" stroke-linecap="round" />
    <path d="M 330 230 Q 370 210 380 180" stroke="url(#front-triangle)" stroke-width="12" fill="none" stroke-linecap="round" />

  <!-- Cute Sprout on Top -->
  <g transform="translate(256 95)">
    <path d="M0 0 Q-4 -15 -8 -24" stroke="#8B5A2B" stroke-width="5" fill="none" />
    <path d="M-8 -24 C-28 -28 -30 -5 -10 0 Z" fill="url(#leaf-triangle)" />
    <path d="M-8 -24 C5 -35 22 -20 5 -5 Z" fill="url(#leaf-triangle)" />
  </g>

  <!-- Eyes -->
  <g>
    <circle cx="215" cy="180" r="18" fill="#222" />
    <circle cx="208" cy="172" r="6" fill="#FFF" />

    <circle cx="297" cy="180" r="18" fill="#222" />
    <circle cx="290" cy="172" r="6" fill="#FFF" />
  </g>

  <!-- Cheeks -->
  <ellipse cx="185" cy="210" rx="18" ry="12" fill="#FF6B81" opacity="0.45" />
  <ellipse cx="327" cy="210" rx="18" ry="12" fill="#FF6B81" opacity="0.45" />

  <!-- Smile -->
  <path d="M225 225 Q256 255 287 225" stroke="#7A1022" stroke-width="8" fill="none" stroke-linecap="round" />

  <!-- Floating Illustration -->
  <!-- Pizza Slice held by Triangle -->
    <g transform="translate(140 300) scale(0.9)">
      <polygon points="0,-35 -30,25 30,25" fill="#ffeaa7" stroke="#d35400" stroke-width="3" />
      <path d="M -30 25 Q 0 33 30 25" stroke="#d35400" stroke-width="6" fill="none" stroke-linecap="round" />
      <circle cx="-8" cy="-5" r="4.5" fill="#e74c3c" />
      <circle cx="8" cy="8" r="4.5" fill="#e74c3c" />
      <circle cx="2" cy="-15" r="4.5" fill="#e74c3c" />
    </g>

  <!-- Bottom Cloud Name Banner -->
  <g filter="url(#shadow-triangle)">
    <path d="M 130 445 C 120 430, 140 410, 165 420 C 185 395, 235 395, 255 420 C 275 395, 325 395, 345 420 C 370 410, 390 430, 380 445 C 395 460, 375 480, 350 470 C 330 485, 280 485, 255 470 C 230 485, 180 485, 160 470 C 135 480, 115 460, 130 445 Z" fill="#ffffff" stroke="#C5EBCF" stroke-width="4" />
    <text x="256" y="455" 
          text-anchor="middle" 
          font-size="28" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
          fill="#7C5730">Triangle</text>
  </g>
</svg>