<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-heart" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF8FC" />
      <stop offset="100%" stop-color="#FFEBF5" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-heart" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffabe7" />
      <stop offset="100%" stop-color="#ff79b0" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
    <linearGradient id="side-heart" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d44e85" />
      <stop offset="100%" stop-color="#9c2d5b" />
    </linearGradient>

    <!-- Leaf Sprout Gradient -->
    <linearGradient id="leaf-heart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7BED9F" />
      <stop offset="100%" stop-color="#2ED573" />
    </linearGradient>

    <!-- 3D Base Shadow -->
    <filter id="shadow-heart">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="236" fill="url(#bg-heart)" stroke="#FBC4EB" stroke-width="6" />

  <!-- Premium Stitched-Sticker Dotted Inner Circle -->
  <circle cx="256" cy="256" r="216" fill="none" stroke="#ffffff" stroke-width="4" stroke-dasharray="8,8" opacity="0.5" />

  <!-- Sparkles -->
  <g fill="#FFD43B">
    <circle cx="100" cy="130" r="8" />
    <circle cx="400" cy="120" r="10" />
    <circle cx="430" cy="330" r="7" />
  </g>

  <!-- Back Limbs (Legs/Feet) -->
  <!-- Legs -->
    <rect x="200" y="300" width="20" height="40" rx="10" fill="url(#side-heart)" />
    <rect x="292" y="300" width="20" height="40" rx="10" fill="url(#side-heart)" />
    <ellipse cx="200" cy="340" rx="18" ry="10" fill="#2f3542" />
    <ellipse cx="312" cy="340" rx="18" ry="10" fill="#2f3542" />

  <!-- Bubbly Shape Body -->
  <g filter="url(#shadow-heart)">
    <!-- Side (3D Offset Layer) -->
    <g fill="url(#side-heart)" stroke="url(#side-heart)" transform="translate(0, 12)">
      <path d="M 256,140 C 256,140 220,95 180,95 C 140,95 120,135 120,175 C 120,230 185,275 256,310 C 327,275 392,230 392,175 C 392,135 372,95 332,95 C 292,95 256,140 256,140 Z" stroke-width="8" stroke-linejoin="round" />
    </g>

    <!-- Front Face Layer -->
    <g fill="url(#front-heart)" stroke="url(#front-heart)">
      <path d="M 256,140 C 256,140 220,95 180,95 C 140,95 120,135 120,175 C 120,230 185,275 256,310 C 327,275 392,230 392,175 C 392,135 372,95 332,95 C 292,95 256,140 256,140 Z" stroke-width="8" stroke-linejoin="round" />
    </g>
  </g>

  <!-- Front Limbs (Arms) -->
  <!-- Arms Hugging Strawberry -->
    <path d="M 160 210 Q 190 260 220 250" stroke="url(#front-heart)" stroke-width="12" fill="none" stroke-linecap="round" />
    <path d="M 350 210 Q 320 260 290 250" stroke="url(#front-heart)" stroke-width="12" fill="none" stroke-linecap="round" />

  <!-- Cute Sprout on Top -->
  <g transform="translate(256 95)">
    <path d="M0 0 Q-4 -15 -8 -24" stroke="#8B5A2B" stroke-width="5" fill="none" />
    <path d="M-8 -24 C-28 -28 -30 -5 -10 0 Z" fill="url(#leaf-heart)" />
    <path d="M-8 -24 C5 -35 22 -20 5 -5 Z" fill="url(#leaf-heart)" />
  </g>

  <!-- Eyes -->
  <g>
    <circle cx="215" cy="180" r="18" fill="#222" />
    <circle cx="208" cy="172" r="6" fill="#FFF" />

    <circle cx="297" cy="180" r="18" fill="#222" />
    <circle cx="290" cy="172" r="6" fill="#FFF" />
  </g>

  <!-- Cheeks -->
  <ellipse cx="185" cy="210" rx="18" ry="12" fill="#FF6B81" opacity="0.45" />
  <ellipse cx="327" cy="210" rx="18" ry="12" fill="#FF6B81" opacity="0.45" />

  <!-- Smile -->
  <path d="M225 225 Q256 255 287 225" stroke="#7A1022" stroke-width="8" fill="none" stroke-linecap="round" />

  <!-- Floating Illustration -->
  <!-- Strawberry hugged by Heart -->
    <g transform="translate(256 260) scale(0.95)">
      <path d="M 0 -22 C -20 -22 -30 10 -15 35 C -5 48 5 48 15 35 C 30 10 20 -22 0 -22 Z" fill="#ff445f" stroke="#c0392b" stroke-width="3" />
      <path d="M 0 -22 C -8 -32 -15 -25 -10 -12 M 0 -22 C 8 -32 15 -25 10 -12" fill="none" stroke="#2ed573" stroke-width="5" stroke-linecap="round" />
      <circle cx="-10" cy="0" r="1.8" fill="#ffd13b" />
      <circle cx="10" cy="5" r="1.8" fill="#ffd13b" />
      <circle cx="0" cy="20" r="1.8" fill="#ffd13b" />
      <circle cx="-5" cy="10" r="1.8" fill="#ffd13b" />
      <circle cx="5" cy="-8" r="1.8" fill="#ffd13b" />
    </g>

  <!-- Bottom Cloud Name Banner -->
  <g filter="url(#shadow-heart)">
    <path d="M 130 445 C 120 430, 140 410, 165 420 C 185 395, 235 395, 255 420 C 275 395, 325 395, 345 420 C 370 410, 390 430, 380 445 C 395 460, 375 480, 350 470 C 330 485, 280 485, 255 470 C 230 485, 180 485, 160 470 C 135 480, 115 460, 130 445 Z" fill="#ffffff" stroke="#FBC4EB" stroke-width="4" />
    <text x="256" y="455" 
          text-anchor="middle" 
          font-size="28" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
          fill="#7C5730">Heart</text>
  </g>
</svg>