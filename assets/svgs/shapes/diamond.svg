<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-diamond" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5FDFD" />
      <stop offset="100%" stop-color="#E6FAFB" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-diamond" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#81ecec" />
      <stop offset="100%" stop-color="#2bcbba" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
    <linearGradient id="side-diamond" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0c8a83" />
      <stop offset="100%" stop-color="#055c58" />
    </linearGradient>

    <!-- Leaf Sprout Gradient -->
    <linearGradient id="leaf-diamond" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7BED9F" />
      <stop offset="100%" stop-color="#2ED573" />
    </linearGradient>

    <!-- 3D Base Shadow -->
    <filter id="shadow-diamond">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="236" fill="url(#bg-diamond)" stroke="#B2F2F4" stroke-width="6" />

  <!-- Premium Stitched-Sticker Dotted Inner Circle -->
  <circle cx="256" cy="256" r="216" fill="none" stroke="#ffffff" stroke-width="4" stroke-dasharray="8,8" opacity="0.5" />

  <!-- Sparkles -->
  <g fill="#FFD43B">
    <circle cx="100" cy="130" r="8" />
    <circle cx="400" cy="120" r="10" />
    <circle cx="430" cy="330" r="7" />
  </g>

  <!-- Back Limbs (Legs/Feet) -->
  <!-- Legs -->
    <rect x="200" y="285" width="20" height="45" rx="10" fill="url(#side-diamond)" />
    <rect x="292" y="285" width="20" height="45" rx="10" fill="url(#side-diamond)" />
    <ellipse cx="200" cy="330" rx="18" ry="10" fill="#2f3542" />
    <ellipse cx="312" cy="330" rx="18" ry="10" fill="#2f3542" />

  <!-- Bubbly Shape Body -->
  <g filter="url(#shadow-diamond)">
    <!-- Side (3D Offset Layer) -->
    <g fill="url(#side-diamond)" stroke="url(#side-diamond)" transform="translate(0, 12)">
      <polygon points="256,114 348,205 256,296 164,205" stroke-width="18" stroke-linejoin="round" />
    </g>

    <!-- Front Face Layer -->
    <g fill="url(#front-diamond)" stroke="url(#front-diamond)">
      <polygon points="256,114 348,205 256,296 164,205" stroke-width="18" stroke-linejoin="round" />
    </g>
  </g>

  <!-- Front Limbs (Arms) -->
  <!-- Arms -->
    <path d="M 175 220 Q 120 240 100 280" stroke="url(#front-diamond)" stroke-width="12" fill="none" stroke-linecap="round" />
    <path d="M 335 220 Q 375 200 385 170" stroke="url(#front-diamond)" stroke-width="12" fill="none" stroke-linecap="round" />

  <!-- Cute Sprout on Top -->
  <g transform="translate(256 95)">
    <path d="M0 0 Q-4 -15 -8 -24" stroke="#8B5A2B" stroke-width="5" fill="none" />
    <path d="M-8 -24 C-28 -28 -30 -5 -10 0 Z" fill="url(#leaf-diamond)" />
    <path d="M-8 -24 C5 -35 22 -20 5 -5 Z" fill="url(#leaf-diamond)" />
  </g>

  <!-- Eyes -->
  <g>
    <circle cx="215" cy="180" r="18" fill="#222" />
    <circle cx="208" cy="172" r="6" fill="#FFF" />

    <circle cx="297" cy="180" r="18" fill="#222" />
    <circle cx="290" cy="172" r="6" fill="#FFF" />
  </g>

  <!-- Cheeks -->
  <ellipse cx="185" cy="210" rx="18" ry="12" fill="#FF6B81" opacity="0.45" />
  <ellipse cx="327" cy="210" rx="18" ry="12" fill="#FF6B81" opacity="0.45" />

  <!-- Smile -->
  <path d="M225 225 Q256 255 287 225" stroke="#7A1022" stroke-width="8" fill="none" stroke-linecap="round" />

  <!-- Floating Illustration -->
  <!-- Kite next to Diamond -->
    <g transform="translate(90 160) scale(0.9)">
      <polygon points="0,-36 26,0 0,36 -26,0" fill="#74b9ff" stroke="#2f3542" stroke-width="3" />
      <line x1="-26" y1="0" x2="26" y2="0" stroke="#2f3542" stroke-width="2" />
      <line x1="0" y1="-36" x2="0" y2="36" stroke="#2f3542" stroke-width="2" />
      <path d="M 0 36 Q -5 50 2 64" stroke="#e74c3c" stroke-width="3" fill="none" />
      <polygon points="0,48 -5,44 -5,52" fill="#ffd13b" />
      <polygon points="1,58 6,54 6,62" fill="#ff7675" />
      <path d="M 0 0 Q 30 60 10 120" stroke="#2f3542" stroke-width="1.5" fill="none" stroke-dasharray="4,4" />
    </g>

  <!-- Bottom Cloud Name Banner -->
  <g filter="url(#shadow-diamond)">
    <path d="M 130 445 C 120 430, 140 410, 165 420 C 185 395, 235 395, 255 420 C 275 395, 325 395, 345 420 C 370 410, 390 430, 380 445 C 395 460, 375 480, 350 470 C 330 485, 280 485, 255 470 C 230 485, 180 485, 160 470 C 135 480, 115 460, 130 445 Z" fill="#ffffff" stroke="#B2F2F4" stroke-width="4" />
    <text x="256" y="455" 
          text-anchor="middle" 
          font-size="28" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
          fill="#7C5730">Diamond</text>
  </g>
</svg>