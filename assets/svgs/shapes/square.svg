<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-square" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0F8FF" />
      <stop offset="100%" stop-color="#E6F2FF" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-square" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#70a1ff" />
      <stop offset="100%" stop-color="#1e90ff" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
    <linearGradient id="side-square" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f71d4" />
      <stop offset="100%" stop-color="#0a529c" />
    </linearGradient>

    <!-- Leaf Sprout Gradient -->
    <linearGradient id="leaf-square" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7BED9F" />
      <stop offset="100%" stop-color="#2ED573" />
    </linearGradient>

    <!-- 3D Base Shadow -->
    <filter id="shadow-square">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="236" fill="url(#bg-square)" stroke="#C2DFFF" stroke-width="6" />

  <!-- Premium Stitched-Sticker Dotted Inner Circle -->
  <circle cx="256" cy="256" r="216" fill="none" stroke="#ffffff" stroke-width="4" stroke-dasharray="8,8" opacity="0.5" />

  <!-- Sparkles -->
  <g fill="#FFD43B">
    <circle cx="100" cy="130" r="8" />
    <circle cx="400" cy="120" r="10" />
    <circle cx="430" cy="330" r="7" />
  </g>

  <!-- Back Limbs (Legs/Feet) -->
  <!-- Legs -->
    <rect x="200" y="285" width="20" height="45" rx="10" fill="url(#side-square)" />
    <rect x="292" y="285" width="20" height="45" rx="10" fill="url(#side-square)" />
    <ellipse cx="200" cy="330" rx="18" ry="10" fill="#2f3542" />
    <ellipse cx="312" cy="330" rx="18" ry="10" fill="#2f3542" />

  <!-- Bubbly Shape Body -->
  <g filter="url(#shadow-square)">
    <!-- Side (3D Offset Layer) -->
    <g fill="url(#side-square)" stroke="url(#side-square)" transform="translate(0, 12)">
      <rect x="161" y="110" width="190" height="190" rx="35" ry="35" />
    </g>

    <!-- Front Face Layer -->
    <g fill="url(#front-square)" stroke="url(#front-square)">
      <rect x="161" y="110" width="190" height="190" rx="35" ry="35" />
    </g>
  </g>

  <!-- Front Limbs (Arms) -->
  <!-- Arms -->
    <path d="M 165 210 Q 120 220 135 270" stroke="url(#front-square)" stroke-width="12" fill="none" stroke-linecap="round" />
    <path d="M 345 210 Q 385 190 395 160" stroke="url(#front-square)" stroke-width="12" fill="none" stroke-linecap="round" />

  <!-- Cute Sprout on Top -->
  <g transform="translate(256 95)">
    <path d="M0 0 Q-4 -15 -8 -24" stroke="#8B5A2B" stroke-width="5" fill="none" />
    <path d="M-8 -24 C-28 -28 -30 -5 -10 0 Z" fill="url(#leaf-square)" />
    <path d="M-8 -24 C5 -35 22 -20 5 -5 Z" fill="url(#leaf-square)" />
  </g>

  <!-- Eyes -->
  <g>
    <circle cx="215" cy="180" r="18" fill="#222" />
    <circle cx="208" cy="172" r="6" fill="#FFF" />

    <circle cx="297" cy="180" r="18" fill="#222" />
    <circle cx="290" cy="172" r="6" fill="#FFF" />
  </g>

  <!-- Cheeks -->
  <ellipse cx="185" cy="210" rx="18" ry="12" fill="#FF6B81" opacity="0.45" />
  <ellipse cx="327" cy="210" rx="18" ry="12" fill="#FF6B81" opacity="0.45" />

  <!-- Smile -->
  <path d="M225 225 Q256 255 287 225" stroke="#7A1022" stroke-width="8" fill="none" stroke-linecap="round" />

  <!-- Floating Illustration -->
  <!-- Gift Box held by Square -->
    <g transform="translate(120 290)">
      <rect x="-24" y="-20" width="48" height="44" rx="4" fill="#e74c3c" stroke="#c0392b" stroke-width="3" />
      <rect x="-27" y="-27" width="54" height="12" rx="3" fill="#ff7675" stroke="#c0392b" stroke-width="3" />
      <line x1="0" y1="-27" x2="0" y2="24" stroke="#ffd13b" stroke-width="6" />
      <path d="M 0 -27 Q -12 -38 0 -32 Q 12 -38 0 -27" fill="#ffd13b" stroke="#d5a100" stroke-width="2" />
    </g>

  <!-- Bottom Cloud Name Banner -->
  <g filter="url(#shadow-square)">
    <path d="M 130 445 C 120 430, 140 410, 165 420 C 185 395, 235 395, 255 420 C 275 395, 325 395, 345 420 C 370 410, 390 430, 380 445 C 395 460, 375 480, 350 470 C 330 485, 280 485, 255 470 C 230 485, 180 485, 160 470 C 135 480, 115 460, 130 445 Z" fill="#ffffff" stroke="#C2DFFF" stroke-width="4" />
    <text x="256" y="455" 
          text-anchor="middle" 
          font-size="28" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
          fill="#7C5730">Square</text>
  </g>
</svg>