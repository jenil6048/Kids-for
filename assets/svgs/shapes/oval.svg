<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-oval" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFF3" />
      <stop offset="100%" stop-color="#FEFADC" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-oval" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fed330" />
      <stop offset="100%" stop-color="#fa8231" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
    <linearGradient id="side-oval" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#da680f" />
      <stop offset="100%" stop-color="#a84c00" />
    </linearGradient>

    <!-- Leaf Sprout Gradient -->
    <linearGradient id="leaf-oval" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7BED9F" />
      <stop offset="100%" stop-color="#2ED573" />
    </linearGradient>

    <!-- 3D Base Shadow -->
    <filter id="shadow-oval">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="236" fill="url(#bg-oval)" stroke="#FDE047" stroke-width="6" />

  <!-- Premium Stitched-Sticker Dotted Inner Circle -->
  <circle cx="256" cy="256" r="216" fill="none" stroke="#ffffff" stroke-width="4" stroke-dasharray="8,8" opacity="0.5" />

  <!-- Sparkles -->
  <g fill="#FFD43B">
    <circle cx="100" cy="130" r="8" />
    <circle cx="400" cy="120" r="10" />
    <circle cx="430" cy="330" r="7" />
  </g>

  <!-- Back Limbs (Legs/Feet) -->
  <!-- Legs -->
    <rect x="200" y="270" width="20" height="50" rx="10" fill="url(#side-oval)" />
    <rect x="292" y="270" width="20" height="50" rx="10" fill="url(#side-oval)" />
    <ellipse cx="200" cy="320" rx="18" ry="10" fill="#2f3542" />
    <ellipse cx="312" cy="320" rx="18" ry="10" fill="#2f3542" />

  <!-- Bubbly Shape Body -->
  <g filter="url(#shadow-oval)">
    <!-- Side (3D Offset Layer) -->
    <g fill="url(#side-oval)" stroke="url(#side-oval)" transform="translate(0, 12)">
      <ellipse cx="256" cy="205" rx="115" ry="80" />
    </g>

    <!-- Front Face Layer -->
    <g fill="url(#front-oval)" stroke="url(#front-oval)">
      <ellipse cx="256" cy="205" rx="115" ry="80" />
    </g>
  </g>

  <!-- Front Limbs (Arms) -->
  <!-- Arms -->
    <path d="M 160 215 Q 120 225 135 260" stroke="url(#front-oval)" stroke-width="12" fill="none" stroke-linecap="round" />
    <path d="M 350 215 Q 390 195 400 165" stroke="url(#front-oval)" stroke-width="12" fill="none" stroke-linecap="round" />

  <!-- Cute Sprout on Top -->
  <g transform="translate(256 95)">
    <path d="M0 0 Q-4 -15 -8 -24" stroke="#8B5A2B" stroke-width="5" fill="none" />
    <path d="M-8 -24 C-28 -28 -30 -5 -10 0 Z" fill="url(#leaf-oval)" />
    <path d="M-8 -24 C5 -35 22 -20 5 -5 Z" fill="url(#leaf-oval)" />
  </g>

  <!-- Eyes -->
  <g>
    <circle cx="215" cy="180" r="18" fill="#222" />
    <circle cx="208" cy="172" r="6" fill="#FFF" />

    <circle cx="297" cy="180" r="18" fill="#222" />
    <circle cx="290" cy="172" r="6" fill="#FFF" />
  </g>

  <!-- Cheeks -->
  <ellipse cx="185" cy="210" rx="18" ry="12" fill="#FF6B81" opacity="0.45" />
  <ellipse cx="327" cy="210" rx="18" ry="12" fill="#FF6B81" opacity="0.45" />

  <!-- Smile -->
  <path d="M225 225 Q256 255 287 225" stroke="#7A1022" stroke-width="8" fill="none" stroke-linecap="round" />

  <!-- Floating Illustration -->
  <!-- Egg held by Oval -->
    <g transform="translate(120 280) scale(0.9)">
      <ellipse cx="0" cy="0" rx="24" ry="34" fill="#f5cd79" stroke="#e67e22" stroke-width="3" />
      <path d="M -22 -10 Q 0 -5 22 -10" fill="none" stroke="#ea8685" stroke-width="4" />
      <path d="M -24 10 Q 0 15 24 10" fill="none" stroke="#54a0ff" stroke-width="4" />
      <circle cx="0" cy="0" r="4" fill="#ffffff" />
      <ellipse cx="-10" cy="-20" rx="5" ry="8" fill="#ffffff" opacity="0.4" />
    </g>

  <!-- Bottom Cloud Name Banner -->
  <g filter="url(#shadow-oval)">
    <path d="M 130 445 C 120 430, 140 410, 165 420 C 185 395, 235 395, 255 420 C 275 395, 325 395, 345 420 C 370 410, 390 430, 380 445 C 395 460, 375 480, 350 470 C 330 485, 280 485, 255 470 C 230 485, 180 485, 160 470 C 135 480, 115 460, 130 445 Z" fill="#ffffff" stroke="#FDE047" stroke-width="4" />
    <text x="256" y="455" 
          text-anchor="middle" 
          font-size="28" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
          fill="#7C5730">Oval</text>
  </g>
</svg>