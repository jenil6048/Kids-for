<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-star" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFF0" />
      <stop offset="100%" stop-color="#FFFDE6" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-star" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffeaa7" />
      <stop offset="100%" stop-color="#ffd13b" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
    <linearGradient id="side-star" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d5a100" />
      <stop offset="100%" stop-color="#a07800" />
    </linearGradient>

    <!-- Leaf Sprout Gradient -->
    <linearGradient id="leaf-star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7BED9F" />
      <stop offset="100%" stop-color="#2ED573" />
    </linearGradient>

    <!-- 3D Base Shadow -->
    <filter id="shadow-star">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="236" fill="url(#bg-star)" stroke="#FFE0B2" stroke-width="6" />

  <!-- Premium Stitched-Sticker Dotted Inner Circle -->
  <circle cx="256" cy="256" r="216" fill="none" stroke="#ffffff" stroke-width="4" stroke-dasharray="8,8" opacity="0.5" />

  <!-- Sparkles -->
  <g fill="#FFD43B">
    <circle cx="100" cy="130" r="8" />
    <circle cx="400" cy="120" r="10" />
    <circle cx="430" cy="330" r="7" />
  </g>

  <!-- Back Limbs (Legs/Feet) -->
  <!-- Legs -->
    <rect x="200" y="280" width="20" height="45" rx="10" fill="url(#side-star)" />
    <rect x="292" y="280" width="20" height="45" rx="10" fill="url(#side-star)" />
    <ellipse cx="200" cy="325" rx="18" ry="10" fill="#2f3542" />
    <ellipse cx="312" cy="325" rx="18" ry="10" fill="#2f3542" />

  <!-- Bubbly Shape Body -->
  <g filter="url(#shadow-star)">
    <!-- Side (3D Offset Layer) -->
    <g fill="url(#side-star)" stroke="url(#side-star)" transform="translate(0, 12)">
      <polygon points="256.0,110.0 282.5,168.6 346.4,175.6 298.8,218.9 311.8,281.9 256.0,250.0 200.2,281.9 213.2,218.9 165.6,175.6 229.5,168.6" stroke-width="18" stroke-linejoin="round" />
    </g>

    <!-- Front Face Layer -->
    <g fill="url(#front-star)" stroke="url(#front-star)">
      <polygon points="256.0,110.0 282.5,168.6 346.4,175.6 298.8,218.9 311.8,281.9 256.0,250.0 200.2,281.9 213.2,218.9 165.6,175.6 229.5,168.6" stroke-width="18" stroke-linejoin="round" />
    </g>
  </g>

  <!-- Front Limbs (Arms) -->
  <!-- Arms -->
    <path d="M 180 220 Q 140 220 150 250" stroke="url(#front-star)" stroke-width="12" fill="none" stroke-linecap="round" />
    <path d="M 330 220 Q 370 200 380 170" stroke="url(#front-star)" stroke-width="12" fill="none" stroke-linecap="round" />

  <!-- Cute Sprout on Top -->
  <g transform="translate(256 95)">
    <path d="M0 0 Q-4 -15 -8 -24" stroke="#8B5A2B" stroke-width="5" fill="none" />
    <path d="M-8 -24 C-28 -28 -30 -5 -10 0 Z" fill="url(#leaf-star)" />
    <path d="M-8 -24 C5 -35 22 -20 5 -5 Z" fill="url(#leaf-star)" />
  </g>

  <!-- Eyes -->
  <g>
    <circle cx="215" cy="180" r="18" fill="#222" />
    <circle cx="208" cy="172" r="6" fill="#FFF" />

    <circle cx="297" cy="180" r="18" fill="#222" />
    <circle cx="290" cy="172" r="6" fill="#FFF" />
  </g>

  <!-- Cheeks -->
  <ellipse cx="185" cy="210" rx="18" ry="12" fill="#FF6B81" opacity="0.45" />
  <ellipse cx="327" cy="210" rx="18" ry="12" fill="#FF6B81" opacity="0.45" />

  <!-- Smile -->
  <path d="M225 225 Q256 255 287 225" stroke="#7A1022" stroke-width="8" fill="none" stroke-linecap="round" />

  <!-- Floating Illustration -->
  <!-- Magic Wand held by Star -->
    <g transform="translate(135 260)">
      <line x1="-15" y1="30" x2="15" y2="-10" stroke="#8B5A2B" stroke-width="6" stroke-linecap="round" />
      <polygon points="15,-10 8,-12 13,-22 21,-17 17,-8" fill="#ffd13b" stroke="#e67e22" stroke-width="2" stroke-linejoin="round" />
      <path d="M 25 -25 L 29 -22 L 26 -18 L 30 -15" stroke="#ffeaa7" stroke-width="2" fill="none" />
      <circle cx="35" cy="-20" r="2" fill="#ffffff" />
      <circle cx="10" cy="-30" r="3" fill="#ffffff" />
    </g>

  <!-- Bottom Cloud Name Banner -->
  <g filter="url(#shadow-star)">
    <path d="M 130 445 C 120 430, 140 410, 165 420 C 185 395, 235 395, 255 420 C 275 395, 325 395, 345 420 C 370 410, 390 430, 380 445 C 395 460, 375 480, 350 470 C 330 485, 280 485, 255 470 C 230 485, 180 485, 160 470 C 135 480, 115 460, 130 445 Z" fill="#ffffff" stroke="#FFE0B2" stroke-width="4" />
    <text x="256" y="455" 
          text-anchor="middle" 
          font-size="28" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
          fill="#7C5730">Star</text>
  </g>
</svg>