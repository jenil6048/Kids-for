<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-crescent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFBF0" />
      <stop offset="100%" stop-color="#FFEDE0" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-crescent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8c291" />
      <stop offset="100%" stop-color="#e77f67" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
    <linearGradient id="side-crescent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b83b5e" />
      <stop offset="100%" stop-color="#900c3f" />
    </linearGradient>

    <!-- Leaf Sprout Gradient -->
    <linearGradient id="leaf-crescent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7BED9F" />
      <stop offset="100%" stop-color="#2ED573" />
    </linearGradient>

    <!-- 3D Base Shadow -->
    <filter id="shadow-crescent">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="236" fill="url(#bg-crescent)" stroke="#FFDAC1" stroke-width="6" />

  <!-- Premium Stitched-Sticker Dotted Inner Circle -->
  <circle cx="256" cy="256" r="216" fill="none" stroke="#ffffff" stroke-width="4" stroke-dasharray="8,8" opacity="0.5" />

  <!-- Sparkles -->
  <g fill="#FFD43B">
    <circle cx="100" cy="130" r="8" />
    <circle cx="400" cy="120" r="10" />
    <circle cx="430" cy="330" r="7" />
  </g>

  <!-- Back Limbs (Legs/Feet) -->
  <!-- Legs Sitting -->
    <rect x="210" y="270" width="20" height="40" rx="10" fill="url(#side-crescent)" transform="rotate(-30 210 270)" />
    <rect x="260" y="270" width="20" height="40" rx="10" fill="url(#side-crescent)" transform="rotate(30 260 270)" />
    <ellipse cx="195" cy="305" rx="18" ry="10" fill="#2f3542" />
    <ellipse cx="275" cy="305" rx="18" ry="10" fill="#2f3542" />

  <!-- Bubbly Shape Body -->
  <g filter="url(#shadow-crescent)">
    <!-- Side (3D Offset Layer) -->
    <g fill="url(#side-crescent)" stroke="url(#side-crescent)" transform="translate(0, 12)">
      <path d="M 180,110 C 255,110 325,150 325,205 C 325,260 255,300 180,300 C 230,280 270,245 270,205 C 270,165 230,130 180,110 Z" stroke-width="16" stroke-linejoin="round" />
    </g>

    <!-- Front Face Layer -->
    <g fill="url(#front-crescent)" stroke="url(#front-crescent)">
      <path d="M 180,110 C 255,110 325,150 325,205 C 325,260 255,300 180,300 C 230,280 270,245 270,205 C 270,165 230,130 180,110 Z" stroke-width="16" stroke-linejoin="round" />
    </g>
  </g>

  <!-- Front Limbs (Arms) -->
  <!-- Arms -->
    <path d="M 185 200 Q 150 170 160 140" stroke="url(#front-crescent)" stroke-width="12" fill="none" stroke-linecap="round" />
    <path d="M 285 210 Q 320 220 310 250" stroke="url(#front-crescent)" stroke-width="12" fill="none" stroke-linecap="round" />

  <!-- Cute Sprout on Top -->
  <g transform="translate(256 95)">
    <path d="M0 0 Q-4 -15 -8 -24" stroke="#8B5A2B" stroke-width="5" fill="none" />
    <path d="M-8 -24 C-28 -28 -30 -5 -10 0 Z" fill="url(#leaf-crescent)" />
    <path d="M-8 -24 C5 -35 22 -20 5 -5 Z" fill="url(#leaf-crescent)" />
  </g>

  <!-- Eyes -->
  <g>
    <circle cx="215" cy="180" r="18" fill="#222" />
    <circle cx="208" cy="172" r="6" fill="#FFF" />

    <circle cx="297" cy="180" r="18" fill="#222" />
    <circle cx="290" cy="172" r="6" fill="#FFF" />
  </g>

  <!-- Cheeks -->
  <ellipse cx="185" cy="210" rx="18" ry="12" fill="#FF6B81" opacity="0.45" />
  <ellipse cx="327" cy="210" rx="18" ry="12" fill="#FF6B81" opacity="0.45" />

  <!-- Smile -->
  <path d="M225 225 Q256 255 287 225" stroke="#7A1022" stroke-width="8" fill="none" stroke-linecap="round" />

  <!-- Floating Illustration -->
  <!-- Night moon and nightcap for Crescent -->
    <g transform="translate(370 340) scale(0.95)">
      <path d="M -20,0 C 0,0 16,16 16,36 C 16,56 0,72 -20,72 C -4,64 6,48 6,36 C 6,24 -4,8 -20,0 Z" fill="#ffd13b" stroke="#e67e22" stroke-width="2" />
      <circle cx="-30" cy="15" r="2" fill="#ffffff" />
      <circle cx="5" cy="5" r="2.5" fill="#ffffff" />
    </g>
    <g transform="translate(195 105) scale(0.85)">
      <path d="M 0 0 C 15 -35 50 -45 60 -15 C 60 5 15 20 0 0 Z" fill="#74b9ff" stroke="#2f3542" stroke-width="2.5" />
      <circle cx="62" cy="-12" r="8" fill="#ffffff" stroke="#2f3542" stroke-width="2" />
    </g>

  <!-- Bottom Cloud Name Banner -->
  <g filter="url(#shadow-crescent)">
    <path d="M 130 445 C 120 430, 140 410, 165 420 C 185 395, 235 395, 255 420 C 275 395, 325 395, 345 420 C 370 410, 390 430, 380 445 C 395 460, 375 480, 350 470 C 330 485, 280 485, 255 470 C 230 485, 180 485, 160 470 C 135 480, 115 460, 130 445 Z" fill="#ffffff" stroke="#FFDAC1" stroke-width="4" />
    <text x="256" y="455" 
          text-anchor="middle" 
          font-size="28" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
          fill="#7C5730">Crescent</text>
  </g>
</svg>