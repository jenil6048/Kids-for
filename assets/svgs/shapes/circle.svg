<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-circle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF8F8" />
      <stop offset="100%" stop-color="#FFEFEF" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-circle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF8B8B" />
      <stop offset="100%" stop-color="#F50000" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
    <linearGradient id="side-circle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C40000" />
      <stop offset="100%" stop-color="#8D0000" />
    </linearGradient>

    <!-- Leaf Sprout Gradient -->
    <linearGradient id="leaf-circle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7BED9F" />
      <stop offset="100%" stop-color="#2ED573" />
    </linearGradient>

    <!-- 3D Base Shadow -->
    <filter id="shadow-circle">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="236" fill="url(#bg-circle)" stroke="#EBC5C5" stroke-width="6" />

  <!-- Premium Stitched-Sticker Dotted Inner Circle -->
  <circle cx="256" cy="256" r="216" fill="none" stroke="#ffffff" stroke-width="4" stroke-dasharray="8,8" opacity="0.5" />

  <!-- Sparkles -->
  <g fill="#FFD43B">
    <circle cx="100" cy="130" r="8" />
    <circle cx="400" cy="120" r="10" />
    <circle cx="430" cy="330" r="7" />
  </g>

  <!-- Back Limbs (Legs/Feet) -->
  <!-- Legs -->
    <rect x="210" y="285" width="20" height="40" rx="10" fill="url(#side-circle)" />
    <rect x="282" y="285" width="20" height="40" rx="10" fill="url(#side-circle)" />
    <ellipse cx="210" cy="325" rx="18" ry="10" fill="#2f3542" />
    <ellipse cx="302" cy="325" rx="18" ry="10" fill="#2f3542" />

  <!-- Bubbly Shape Body -->
  <g filter="url(#shadow-circle)">
    <!-- Side (3D Offset Layer) -->
    <g fill="url(#side-circle)" stroke="url(#side-circle)" transform="translate(0, 12)">
      <circle cx="256" cy="205" r="95" />
    </g>

    <!-- Front Face Layer -->
    <g fill="url(#front-circle)" stroke="url(#front-circle)">
      <circle cx="256" cy="205" r="95" />
    </g>
  </g>

  <!-- Front Limbs (Arms) -->
  <!-- Arms -->
    <path d="M 340 210 Q 380 190 395 160" stroke="url(#front-circle)" stroke-width="12" fill="none" stroke-linecap="round" />
    <path d="M 170 210 Q 130 220 145 250" stroke="url(#front-circle)" stroke-width="12" fill="none" stroke-linecap="round" />

  <!-- Cute Sprout on Top -->
  <g transform="translate(256 95)">
    <path d="M0 0 Q-4 -15 -8 -24" stroke="#8B5A2B" stroke-width="5" fill="none" />
    <path d="M-8 -24 C-28 -28 -30 -5 -10 0 Z" fill="url(#leaf-circle)" />
    <path d="M-8 -24 C5 -35 22 -20 5 -5 Z" fill="url(#leaf-circle)" />
  </g>

  <!-- Eyes -->
  <g>
    <circle cx="215" cy="180" r="18" fill="#222" />
    <circle cx="208" cy="172" r="6" fill="#FFF" />

    <circle cx="297" cy="180" r="18" fill="#222" />
    <circle cx="290" cy="172" r="6" fill="#FFF" />
  </g>

  <!-- Cheeks -->
  <ellipse cx="185" cy="210" rx="18" ry="12" fill="#FF6B81" opacity="0.45" />
  <ellipse cx="327" cy="210" rx="18" ry="12" fill="#FF6B81" opacity="0.45" />

  <!-- Smile -->
  <path d="M225 225 Q256 255 287 225" stroke="#7A1022" stroke-width="8" fill="none" stroke-linecap="round" />

  <!-- Floating Illustration -->
  <!-- Cute Donut held by Circle -->
    <g transform="translate(130 260)">
      <circle cx="0" cy="0" r="32" fill="#f0932b" stroke="#d35400" stroke-width="3" />
      <circle cx="0" cy="0" r="11" fill="url(#bg-circle)" stroke="#d35400" stroke-width="3" />
      <path d="M -24 -10 Q -15 -25 0 -25 Q 15 -25 24 -10 Q 28 5 20 20 Q 5 28 0 20 Q -15 28 -24 -10 Z" fill="#ff7675" />
      <circle cx="-12" cy="-12" r="2" fill="#ffd13b" />
      <circle cx="12" cy="-12" r="2" fill="#2ed573" />
      <circle cx="0" cy="12" r="2" fill="#ffffff" />
      <circle cx="-14" cy="8" r="2" fill="#ffffff" />
      <circle cx="14" cy="6" r="2" fill="#ffd13b" />
    </g>

  <!-- Bottom Cloud Name Banner -->
  <g filter="url(#shadow-circle)">
    <path d="M 130 445 C 120 430, 140 410, 165 420 C 185 395, 235 395, 255 420 C 275 395, 325 395, 345 420 C 370 410, 390 430, 380 445 C 395 460, 375 480, 350 470 C 330 485, 280 485, 255 470 C 230 485, 180 485, 160 470 C 135 480, 115 460, 130 445 Z" fill="#ffffff" stroke="#EBC5C5" stroke-width="4" />
    <text x="256" y="455" 
          text-anchor="middle" 
          font-size="28" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
          fill="#7C5730">Circle</text>
  </g>
</svg>