<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-august" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E0F7FA" />
      <stop offset="100%" stop-color="#FFE0B2" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-august" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fed330" />
      <stop offset="100%" stop-color="#fa8231" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
    <linearGradient id="side-august" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#da680f" />
      <stop offset="100%" stop-color="#a84c00" />
    </linearGradient>

    <!-- Leaf Sprout Gradient -->
    <linearGradient id="leaf-august" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7BED9F" />
      <stop offset="100%" stop-color="#2ED573" />
    </linearGradient>

    <!-- 3D Base Shadow -->
    <filter id="shadow-august">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="236" fill="url(#bg-august)" stroke="#FFCC80" stroke-width="6" />

  <!-- Premium Stitched-Sticker Dotted Inner Circle -->
  <circle cx="256" cy="256" r="216" fill="none" stroke="#ffffff" stroke-width="4" stroke-dasharray="8,8" opacity="0.4" />

  <!-- Sparkles -->
  <g fill="#FFD43B">
    <circle cx="100" cy="130" r="8" />
    <circle cx="400" cy="120" r="10" />
    <circle cx="430" cy="330" r="7" />
  </g>

  <!-- Back Limbs (Legs/Feet) -->
  <!-- Legs -->
    <rect x="200" y="265" width="16" height="40" rx="8" fill="url(#side-august)" />
    <rect x="296" y="265" width="16" height="40" rx="8" fill="url(#side-august)" />
    <ellipse cx="200" cy="300" rx="14" ry="8" fill="#2f3542" />
    <ellipse cx="306" cy="300" rx="14" ry="8" fill="#2f3542" />

  <!-- Bubbly Shape Body -->
  <g filter="url(#shadow-august)">
    <!-- Side (3D Offset Layer) -->
    <g fill="url(#side-august)" stroke="url(#side-august)" transform="translate(0, 12)">
      <!-- Sandcastle -->
    <rect x="176" y="160" width="160" height="110" rx="10" fill="url(#front-august)" stroke="url(#side-august)" stroke-width="3" />
    <rect x="156" y="130" width="36" height="140" rx="6" fill="url(#front-august)" stroke="url(#side-august)" stroke-width="3" />
    <rect x="320" y="130" width="36" height="140" rx="6" fill="url(#front-august)" stroke="url(#side-august)" stroke-width="3" />
    <polygon points="174,130 152,130 174,90" fill="#ff7f50" stroke="#d55e00" stroke-width="2" />
    <polygon points="338,130 358,130 338,90" fill="#ff7f50" stroke="#d55e00" stroke-width="2" />
    </g>

    <!-- Front Face Layer -->
    <g fill="url(#front-august)" stroke="url(#front-august)">
      <!-- Sandcastle -->
    <rect x="176" y="160" width="160" height="110" rx="10" fill="url(#front-august)" stroke="url(#side-august)" stroke-width="3" />
    <rect x="156" y="130" width="36" height="140" rx="6" fill="url(#front-august)" stroke="url(#side-august)" stroke-width="3" />
    <rect x="320" y="130" width="36" height="140" rx="6" fill="url(#front-august)" stroke="url(#side-august)" stroke-width="3" />
    <polygon points="174,130 152,130 174,90" fill="#ff7f50" stroke="#d55e00" stroke-width="2" />
    <polygon points="338,130 358,130 338,90" fill="#ff7f50" stroke="#d55e00" stroke-width="2" />
    </g>
  </g>

  <!-- Front Limbs (Arms) -->
  <path d="M 160 200 Q 120 210 135 240" stroke="url(#front-august)" stroke-width="10" fill="none" stroke-linecap="round" />
    <path d="M 352 200 Q 392 210 377 240" stroke="url(#front-august)" stroke-width="10" fill="none" stroke-linecap="round" />

  <!-- Cute Sprout on Top -->
  <g transform="translate(256 140)">
    <path d="M0 0 Q-4 -15 -8 -24" stroke="#8B5A2B" stroke-width="5" fill="none" />
    <path d="M-8 -24 C-28 -28 -30 -5 -10 0 Z" fill="url(#leaf-august)" />
    <path d="M-8 -24 C5 -35 22 -20 5 -5 Z" fill="url(#leaf-august)" />
  </g>

  <!-- Custom Face Elements -->
  <g>
      <circle cx="232" cy="190" r="14" fill="#222" />
      <circle cx="228" cy="184" r="5" fill="#FFF" />
      <circle cx="280" cy="190" r="14" fill="#222" />
      <circle cx="276" cy="184" r="5" fill="#FFF" />
    </g>
    <ellipse cx="205" cy="215" rx="14" ry="9" fill="#FF6B81" opacity="0.45" />
    <ellipse cx="307" cy="215" rx="14" ry="9" fill="#FF6B81" opacity="0.45" />
    <path d="M238 220 Q256 240 274 220" stroke="#7A1022" stroke-width="6" fill="none" stroke-linecap="round" />

  <!-- Bottom Wooden Plank Name Banner -->
  <g filter="url(#shadow-august)">
    <!-- Plank -->
    <rect x="120" y="420" width="272" height="54" rx="10" fill="#D7A15C" stroke="#7C5730" stroke-width="4" />
    <!-- Wood grain detail lines -->
    <path d="M 130 432 Q 256 438 380 432" stroke="#9C6B30" stroke-width="2.5" fill="none" />
    <path d="M 140 460 Q 256 466 370 460" stroke="#9C6B30" stroke-width="1.5" fill="none" />
    <!-- Name Text -->
    <text x="256" y="455" 
          text-anchor="middle" 
          font-size="28" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
          fill="#7C5730">August</text>
  </g>
</svg>