<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-february" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF0F5" />
      <stop offset="100%" stop-color="#FFD1DC" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-february" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d2b48c" />
      <stop offset="100%" stop-color="#8B5A2B" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
    <linearGradient id="side-february" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6e4018" />
      <stop offset="100%" stop-color="#4d2a0e" />
    </linearGradient>

    <!-- Leaf Sprout Gradient -->
    <linearGradient id="leaf-february" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7BED9F" />
      <stop offset="100%" stop-color="#2ED573" />
    </linearGradient>

    <!-- 3D Base Shadow -->
    <filter id="shadow-february">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="236" fill="url(#bg-february)" stroke="#FBC4EB" stroke-width="6" />

  <!-- Premium Stitched-Sticker Dotted Inner Circle -->
  <circle cx="256" cy="256" r="216" fill="none" stroke="#ffffff" stroke-width="4" stroke-dasharray="8,8" opacity="0.4" />

  <!-- Sparkles -->
  <g fill="#FFD43B">
    <circle cx="100" cy="130" r="8" />
    <circle cx="400" cy="120" r="10" />
    <circle cx="430" cy="330" r="7" />
  </g>

  <!-- Back Limbs (Legs/Feet) -->
  <!-- Red Heart -->
    <path d="M 256,220 C 256,220 236,195 216,195 C 196,195 186,215 186,235 C 186,260 216,285 256,305 C 296,285 326,260 326,235 C 326,215 316,195 296,195 C 276,195 256,220 256,220 Z" fill="#ff4757" />
    <!-- Feet -->
    <circle cx="210" cy="300" r="18" fill="url(#side-february)" />
    <circle cx="302" cy="300" r="18" fill="url(#side-february)" />

  <!-- Bubbly Shape Body -->
  <g filter="url(#shadow-february)">
    <!-- Side (3D Offset Layer) -->
    <g fill="url(#side-february)" stroke="url(#side-february)" transform="translate(0, 12)">
      <!-- Teddy Bear Head -->
    <circle cx="256" cy="165" r="50" />
    <circle cx="215" cy="125" r="16" />
    <circle cx="297" cy="125" r="16" />
    <!-- Muzzle -->
    <ellipse cx="256" cy="180" rx="14" ry="10" fill="#ffffff" opacity="0.9" />
    <!-- Nose -->
    <ellipse cx="256" cy="176" rx="5" ry="3" fill="#222" />
    </g>

    <!-- Front Face Layer -->
    <g fill="url(#front-february)" stroke="url(#front-february)">
      <!-- Teddy Bear Head -->
    <circle cx="256" cy="165" r="50" />
    <circle cx="215" cy="125" r="16" />
    <circle cx="297" cy="125" r="16" />
    <!-- Muzzle -->
    <ellipse cx="256" cy="180" rx="14" ry="10" fill="#ffffff" opacity="0.9" />
    <!-- Nose -->
    <ellipse cx="256" cy="176" rx="5" ry="3" fill="#222" />
    </g>
  </g>

  <!-- Front Limbs (Arms) -->
  <!-- Teddy Bear Arms holding heart -->
    <path d="M 210 200 Q 180 230 205 255" stroke="url(#front-february)" stroke-width="12" fill="none" stroke-linecap="round" />
    <path d="M 302 200 Q 332 230 307 255" stroke="url(#front-february)" stroke-width="12" fill="none" stroke-linecap="round" />

  <!-- Cute Sprout on Top -->
  <g transform="translate(256 115)">
    <path d="M0 0 Q-4 -15 -8 -24" stroke="#8B5A2B" stroke-width="5" fill="none" />
    <path d="M-8 -24 C-28 -28 -30 -5 -10 0 Z" fill="url(#leaf-february)" />
    <path d="M-8 -24 C5 -35 22 -20 5 -5 Z" fill="url(#leaf-february)" />
  </g>

  <!-- Custom Face Elements -->
  <!-- Face for February -->
    <g>
      <circle cx="235" cy="155" r="10" fill="#222" />
      <circle cx="231" cy="150" r="3.5" fill="#FFF" />
      <circle cx="277" cy="155" r="10" fill="#222" />
      <circle cx="273" cy="150" r="3.5" fill="#FFF" />
    </g>
    <ellipse cx="215" cy="172" rx="10" ry="6" fill="#FF6B81" opacity="0.45" />
    <ellipse cx="297" cy="172" rx="10" ry="6" fill="#FF6B81" opacity="0.45" />
    <path d="M245 186 Q256 193 267 186" stroke="#7A1022" stroke-width="4" fill="none" stroke-linecap="round" />

  <!-- Bottom Wooden Plank Name Banner -->
  <g filter="url(#shadow-february)">
    <!-- Plank -->
    <rect x="120" y="420" width="272" height="54" rx="10" fill="#D7A15C" stroke="#7C5730" stroke-width="4" />
    <!-- Wood grain detail lines -->
    <path d="M 130 432 Q 256 438 380 432" stroke="#9C6B30" stroke-width="2.5" fill="none" />
    <path d="M 140 460 Q 256 466 370 460" stroke="#9C6B30" stroke-width="1.5" fill="none" />
    <!-- Name Text -->
    <text x="256" y="455" 
          text-anchor="middle" 
          font-size="28" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
          fill="#7C5730">February</text>
  </g>
</svg>