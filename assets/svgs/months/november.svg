<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-november" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E1" />
      <stop offset="100%" stop-color="#FFECB3" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-november" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffbe76" />
      <stop offset="100%" stop-color="#d5a100" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
    <linearGradient id="side-november" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a07800" />
      <stop offset="100%" stop-color="#6e5000" />
    </linearGradient>

    <!-- Leaf Sprout Gradient -->
    <linearGradient id="leaf-november" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7BED9F" />
      <stop offset="100%" stop-color="#2ED573" />
    </linearGradient>

    <!-- 3D Base Shadow -->
    <filter id="shadow-november">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="236" fill="url(#bg-november)" stroke="#FFE082" stroke-width="6" />

  <!-- Premium Stitched-Sticker Dotted Inner Circle -->
  <circle cx="256" cy="256" r="216" fill="none" stroke="#ffffff" stroke-width="4" stroke-dasharray="8,8" opacity="0.4" />

  <!-- Sparkles -->
  <g fill="#FFD43B">
    <circle cx="100" cy="130" r="8" />
    <circle cx="400" cy="120" r="10" />
    <circle cx="430" cy="330" r="7" />
  </g>

  <!-- Back Limbs (Legs/Feet) -->
  <!-- Legs -->
    <rect x="210" y="295" width="16" height="35" rx="8" fill="url(#side-november)" />
    <rect x="286" y="295" width="16" height="35" rx="8" fill="url(#side-november)" />
    <ellipse cx="210" cy="325" rx="14" ry="8" fill="#2f3542" />
    <ellipse cx="296" cy="325" rx="14" ry="8" fill="#2f3542" />

  <!-- Bubbly Shape Body -->
  <g filter="url(#shadow-november)">
    <!-- Side (3D Offset Layer) -->
    <g fill="url(#side-november)" stroke="url(#side-november)" transform="translate(0, 12)">
      <!-- Oak Leaf -->
    <path d="M 256,110 C 310,110 340,150 320,195 C 345,200 350,230 310,250 C 325,270 295,295 256,285 C 217,295 187,270 202,250 C 162,230 167,200 192,195 C 172,150 202,110 256,110 Z" fill="url(#front-november)" stroke="url(#side-november)" stroke-width="2" />
    <line x1="256" y1="120" x2="256" y2="280" stroke="url(#side-november)" stroke-width="3" stroke-linecap="round" />
    <line x1="256" y1="170" x2="290" y2="150" stroke="url(#side-november)" stroke-width="2" />
    <line x1="256" y1="170" x2="222" y2="150" stroke="url(#side-november)" stroke-width="2" />
    <line x1="256" y1="210" x2="295" y2="195" stroke="url(#side-november)" stroke-width="2" />
    <line x1="256" y1="210" x2="217" y2="195" stroke="url(#side-november)" stroke-width="2" />
    <path d="M 256,285 L 256,310" stroke="#8B5A2B" stroke-width="6" stroke-linecap="round" />
    </g>

    <!-- Front Face Layer -->
    <g fill="url(#front-november)" stroke="url(#front-november)">
      <!-- Oak Leaf -->
    <path d="M 256,110 C 310,110 340,150 320,195 C 345,200 350,230 310,250 C 325,270 295,295 256,285 C 217,295 187,270 202,250 C 162,230 167,200 192,195 C 172,150 202,110 256,110 Z" fill="url(#front-november)" stroke="url(#side-november)" stroke-width="2" />
    <line x1="256" y1="120" x2="256" y2="280" stroke="url(#side-november)" stroke-width="3" stroke-linecap="round" />
    <line x1="256" y1="170" x2="290" y2="150" stroke="url(#side-november)" stroke-width="2" />
    <line x1="256" y1="170" x2="222" y2="150" stroke="url(#side-november)" stroke-width="2" />
    <line x1="256" y1="210" x2="295" y2="195" stroke="url(#side-november)" stroke-width="2" />
    <line x1="256" y1="210" x2="217" y2="195" stroke="url(#side-november)" stroke-width="2" />
    <path d="M 256,285 L 256,310" stroke="#8B5A2B" stroke-width="6" stroke-linecap="round" />
    </g>
  </g>

  <!-- Front Limbs (Arms) -->
  <path d="M 185 210 Q 145 220 160 250" stroke="url(#front-november)" stroke-width="10" fill="none" stroke-linecap="round" />
    <path d="M 327 210 Q 367 220 352 250" stroke="url(#front-november)" stroke-width="10" fill="none" stroke-linecap="round" />

  <!-- Cute Sprout on Top -->
  <g transform="translate(256 95)">
    <path d="M0 0 Q-4 -15 -8 -24" stroke="#8B5A2B" stroke-width="5" fill="none" />
    <path d="M-8 -24 C-28 -28 -30 -5 -10 0 Z" fill="url(#leaf-november)" />
    <path d="M-8 -24 C5 -35 22 -20 5 -5 Z" fill="url(#leaf-november)" />
  </g>

  <!-- Custom Face Elements -->
  <g>
      <circle cx="230" cy="180" r="14" fill="#222" />
      <circle cx="226" cy="174" r="5" fill="#FFF" />
      <circle cx="282" cy="180" r="14" fill="#222" />
      <circle cx="278" cy="174" r="5" fill="#FFF" />
    </g>
    <ellipse cx="205" cy="205" rx="14" ry="9" fill="#FF6B81" opacity="0.45" />
    <ellipse cx="307" cy="205" rx="14" ry="9" fill="#FF6B81" opacity="0.45" />
    <path d="M238 215 Q256 235 274 215" stroke="#7A1022" stroke-width="6" fill="none" stroke-linecap="round" />

  <!-- Bottom Wooden Plank Name Banner -->
  <g filter="url(#shadow-november)">
    <!-- Plank -->
    <rect x="120" y="420" width="272" height="54" rx="10" fill="#D7A15C" stroke="#7C5730" stroke-width="4" />
    <!-- Wood grain detail lines -->
    <path d="M 130 432 Q 256 438 380 432" stroke="#9C6B30" stroke-width="2.5" fill="none" />
    <path d="M 140 460 Q 256 466 370 460" stroke="#9C6B30" stroke-width="1.5" fill="none" />
    <!-- Name Text -->
    <text x="256" y="455" 
          text-anchor="middle" 
          font-size="28" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
          fill="#7C5730">November</text>
  </g>
</svg>