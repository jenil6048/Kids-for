<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-september" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFDE7" />
      <stop offset="100%" stop-color="#FFF9C4" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-september" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f9ca24" />
      <stop offset="100%" stop-color="#f0932b" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
    <linearGradient id="side-september" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d58010" />
      <stop offset="100%" stop-color="#a05000" />
    </linearGradient>

    <!-- Leaf Sprout Gradient -->
    <linearGradient id="leaf-september" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7BED9F" />
      <stop offset="100%" stop-color="#2ED573" />
    </linearGradient>

    <!-- 3D Base Shadow -->
    <filter id="shadow-september">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="236" fill="url(#bg-september)" stroke="#FFE082" stroke-width="6" />

  <!-- Premium Stitched-Sticker Dotted Inner Circle -->
  <circle cx="256" cy="256" r="216" fill="none" stroke="#ffffff" stroke-width="4" stroke-dasharray="8,8" opacity="0.4" />

  <!-- Sparkles -->
  <g fill="#FFD43B">
    <circle cx="100" cy="130" r="8" />
    <circle cx="400" cy="120" r="10" />
    <circle cx="430" cy="330" r="7" />
  </g>

  <!-- Back Limbs (Legs/Feet) -->
  

  <!-- Bubbly Shape Body -->
  <g filter="url(#shadow-september)">
    <!-- Side (3D Offset Layer) -->
    <g fill="url(#side-september)" stroke="url(#side-september)" transform="translate(0, 12)">
      <!-- School Bus -->
    <rect x="156" y="130" width="200" height="130" rx="20" fill="url(#front-september)" stroke="url(#side-september)" stroke-width="3" />
    <rect x="176" y="150" width="45" height="35" rx="5" fill="#70a1ff" stroke="#2f3542" stroke-width="2" />
    <rect x="236" y="150" width="45" height="35" rx="5" fill="#70a1ff" stroke="#2f3542" stroke-width="2" />
    <rect x="296" y="150" width="45" height="35" rx="5" fill="#70a1ff" stroke="#2f3542" stroke-width="2" />
    <circle cx="196" cy="270" r="22" fill="#2f3542" stroke="#ffffff" stroke-width="3" />
    <circle cx="316" cy="270" r="22" fill="#2f3542" stroke="#ffffff" stroke-width="3" />
    </g>

    <!-- Front Face Layer -->
    <g fill="url(#front-september)" stroke="url(#front-september)">
      <!-- School Bus -->
    <rect x="156" y="130" width="200" height="130" rx="20" fill="url(#front-september)" stroke="url(#side-september)" stroke-width="3" />
    <rect x="176" y="150" width="45" height="35" rx="5" fill="#70a1ff" stroke="#2f3542" stroke-width="2" />
    <rect x="236" y="150" width="45" height="35" rx="5" fill="#70a1ff" stroke="#2f3542" stroke-width="2" />
    <rect x="296" y="150" width="45" height="35" rx="5" fill="#70a1ff" stroke="#2f3542" stroke-width="2" />
    <circle cx="196" cy="270" r="22" fill="#2f3542" stroke="#ffffff" stroke-width="3" />
    <circle cx="316" cy="270" r="22" fill="#2f3542" stroke="#ffffff" stroke-width="3" />
    </g>
  </g>

  <!-- Front Limbs (Arms) -->
  <path d="M 160 200 Q 120 200 135 230" stroke="url(#front-september)" stroke-width="10" fill="none" stroke-linecap="round" />
    <path d="M 352 200 Q 392 200 377 230" stroke="url(#front-september)" stroke-width="10" fill="none" stroke-linecap="round" />

  <!-- Cute Sprout on Top -->
  <g transform="translate(256 115)">
    <path d="M0 0 Q-4 -15 -8 -24" stroke="#8B5A2B" stroke-width="5" fill="none" />
    <path d="M-8 -24 C-28 -28 -30 -5 -10 0 Z" fill="url(#leaf-september)" />
    <path d="M-8 -24 C5 -35 22 -20 5 -5 Z" fill="url(#leaf-september)" />
  </g>

  <!-- Custom Face Elements -->
  <g>
      <circle cx="232" cy="210" r="12" fill="#222" />
      <circle cx="228" cy="205" r="4" fill="#FFF" />
      <circle cx="280" cy="210" r="12" fill="#222" />
      <circle cx="276" cy="205" r="4" fill="#FFF" />
    </g>
    <ellipse cx="212" cy="225" rx="12" ry="8" fill="#FF6B81" opacity="0.45" />
    <ellipse cx="300" cy="225" rx="12" ry="8" fill="#FF6B81" opacity="0.45" />
    <path d="M240 230 Q256 245 272 230" stroke="#7A1022" stroke-width="5" fill="none" stroke-linecap="round" />

  <!-- Bottom Wooden Plank Name Banner -->
  <g filter="url(#shadow-september)">
    <!-- Plank -->
    <rect x="120" y="420" width="272" height="54" rx="10" fill="#D7A15C" stroke="#7C5730" stroke-width="4" />
    <!-- Wood grain detail lines -->
    <path d="M 130 432 Q 256 438 380 432" stroke="#9C6B30" stroke-width="2.5" fill="none" />
    <path d="M 140 460 Q 256 466 370 460" stroke="#9C6B30" stroke-width="1.5" fill="none" />
    <!-- Name Text -->
    <text x="256" y="455" 
          text-anchor="middle" 
          font-size="28" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
          fill="#7C5730">September</text>
  </g>
</svg>