<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-december" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFEBEE" />
      <stop offset="100%" stop-color="#FFCDD2" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-december" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2ed573" />
      <stop offset="100%" stop-color="#20bf6b" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
    <linearGradient id="side-december" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10ac84" />
      <stop offset="100%" stop-color="#019474" />
    </linearGradient>

    <!-- Leaf Sprout Gradient -->
    <linearGradient id="leaf-december" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7BED9F" />
      <stop offset="100%" stop-color="#2ED573" />
    </linearGradient>

    <!-- 3D Base Shadow -->
    <filter id="shadow-december">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="236" fill="url(#bg-december)" stroke="#EF9A9A" stroke-width="6" />

  <!-- Premium Stitched-Sticker Dotted Inner Circle -->
  <circle cx="256" cy="256" r="216" fill="none" stroke="#ffffff" stroke-width="4" stroke-dasharray="8,8" opacity="0.4" />

  <!-- Sparkles -->
  <g fill="#FFD43B">
    <circle cx="100" cy="130" r="8" />
    <circle cx="400" cy="120" r="10" />
    <circle cx="430" cy="330" r="7" />
  </g>

  <!-- Back Limbs (Legs/Feet) -->
  <!-- Legs -->
    <rect x="210" y="305" width="16" height="35" rx="8" fill="url(#side-december)" />
    <rect x="286" y="305" width="16" height="35" rx="8" fill="url(#side-december)" />
    <ellipse cx="210" cy="335" rx="14" ry="8" fill="#2f3542" />
    <ellipse cx="296" cy="335" rx="14" ry="8" fill="#2f3542" />

  <!-- Bubbly Shape Body -->
  <g filter="url(#shadow-december)">
    <!-- Side (3D Offset Layer) -->
    <g fill="url(#side-december)" stroke="url(#side-december)" transform="translate(0, 12)">
      <!-- Pine Tree -->
    <polygon points="256,110 206,170 306,170" fill="url(#front-december)" stroke="url(#side-december)" stroke-width="2" />
    <polygon points="256,155 186,230 326,230" fill="url(#front-december)" stroke="url(#side-december)" stroke-width="2" />
    <polygon points="256,210 166,295 346,295" fill="url(#front-december)" stroke="url(#side-december)" stroke-width="2" />
    <rect x="241" y="295" width="30" height="25" fill="#8B5A2B" />
    <!-- Yellow Star -->
    <polygon points="256,110 252,98 262,103 250,103 260,98" fill="#ffd13b" stroke="#e67e22" stroke-width="1.5" stroke-linejoin="round" />
    <!-- Ornaments -->
    <circle cx="226" cy="200" r="5" fill="#ff4757" />
    <circle cx="286" cy="200" r="5" fill="#1e90ff" />
    <circle cx="256" cy="260" r="5" fill="#ffd13b" />
    <circle cx="216" cy="265" r="5" fill="#ffffff" />
    <circle cx="296" cy="265" r="5" fill="#ff4757" />
    </g>

    <!-- Front Face Layer -->
    <g fill="url(#front-december)" stroke="url(#front-december)">
      <!-- Pine Tree -->
    <polygon points="256,110 206,170 306,170" fill="url(#front-december)" stroke="url(#side-december)" stroke-width="2" />
    <polygon points="256,155 186,230 326,230" fill="url(#front-december)" stroke="url(#side-december)" stroke-width="2" />
    <polygon points="256,210 166,295 346,295" fill="url(#front-december)" stroke="url(#side-december)" stroke-width="2" />
    <rect x="241" y="295" width="30" height="25" fill="#8B5A2B" />
    <!-- Yellow Star -->
    <polygon points="256,110 252,98 262,103 250,103 260,98" fill="#ffd13b" stroke="#e67e22" stroke-width="1.5" stroke-linejoin="round" />
    <!-- Ornaments -->
    <circle cx="226" cy="200" r="5" fill="#ff4757" />
    <circle cx="286" cy="200" r="5" fill="#1e90ff" />
    <circle cx="256" cy="260" r="5" fill="#ffd13b" />
    <circle cx="216" cy="265" r="5" fill="#ffffff" />
    <circle cx="296" cy="265" r="5" fill="#ff4757" />
    </g>
  </g>

  <!-- Front Limbs (Arms) -->
  <path d="M 195 240 Q 155 250 170 280" stroke="url(#front-december)" stroke-width="10" fill="none" stroke-linecap="round" />
    <path d="M 317 240 Q 357 250 342 280" stroke="url(#front-december)" stroke-width="10" fill="none" stroke-linecap="round" />

  <!-- Cute Sprout on Top -->
  <g transform="translate(256 95)">
    <path d="M0 0 Q-4 -15 -8 -24" stroke="#8B5A2B" stroke-width="5" fill="none" />
    <path d="M-8 -24 C-28 -28 -30 -5 -10 0 Z" fill="url(#leaf-december)" />
    <path d="M-8 -24 C5 -35 22 -20 5 -5 Z" fill="url(#leaf-december)" />
  </g>

  <!-- Custom Face Elements -->
  <g>
      <circle cx="235" cy="230" r="12" fill="#222" />
      <circle cx="231" cy="225" r="4" fill="#FFF" />
      <circle cx="277" cy="230" r="12" fill="#222" />
      <circle cx="273" cy="225" r="4" fill="#FFF" />
    </g>
    <ellipse cx="215" cy="250" rx="12" ry="8" fill="#FF6B81" opacity="0.45" />
    <ellipse cx="297" cy="250" rx="12" ry="8" fill="#FF6B81" opacity="0.45" />
    <path d="M242 255 Q256 270 270 255" stroke="#7A1022" stroke-width="5" fill="none" stroke-linecap="round" />

  <!-- Bottom Wooden Plank Name Banner -->
  <g filter="url(#shadow-december)">
    <!-- Plank -->
    <rect x="120" y="420" width="272" height="54" rx="10" fill="#D7A15C" stroke="#7C5730" stroke-width="4" />
    <!-- Wood grain detail lines -->
    <path d="M 130 432 Q 256 438 380 432" stroke="#9C6B30" stroke-width="2.5" fill="none" />
    <path d="M 140 460 Q 256 466 370 460" stroke="#9C6B30" stroke-width="1.5" fill="none" />
    <!-- Name Text -->
    <text x="256" y="455" 
          text-anchor="middle" 
          font-size="28" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
          fill="#7C5730">December</text>
  </g>
</svg>