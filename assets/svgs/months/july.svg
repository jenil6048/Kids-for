<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-july" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF0F0" />
      <stop offset="100%" stop-color="#FFEBEE" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-july" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff8b8b" />
      <stop offset="100%" stop-color="#f50000" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
    <linearGradient id="side-july" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c40000" />
      <stop offset="100%" stop-color="#8d0000" />
    </linearGradient>

    <!-- Leaf Sprout Gradient -->
    <linearGradient id="leaf-july" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7BED9F" />
      <stop offset="100%" stop-color="#2ED573" />
    </linearGradient>

    <!-- 3D Base Shadow -->
    <filter id="shadow-july">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="236" fill="url(#bg-july)" stroke="#FFCDD2" stroke-width="6" />

  <!-- Premium Stitched-Sticker Dotted Inner Circle -->
  <circle cx="256" cy="256" r="216" fill="none" stroke="#ffffff" stroke-width="4" stroke-dasharray="8,8" opacity="0.4" />

  <!-- Sparkles -->
  <g fill="#FFD43B">
    <circle cx="100" cy="130" r="8" />
    <circle cx="400" cy="120" r="10" />
    <circle cx="430" cy="330" r="7" />
  </g>

  <!-- Back Limbs (Legs/Feet) -->
  <!-- Legs -->
    <rect x="210" y="270" width="16" height="40" rx="8" fill="url(#side-july)" />
    <rect x="286" y="270" width="16" height="40" rx="8" fill="url(#side-july)" />
    <ellipse cx="210" cy="305" rx="14" ry="8" fill="#2f3542" />
    <ellipse cx="296" cy="305" rx="14" ry="8" fill="#2f3542" />

  <!-- Bubbly Shape Body -->
  <g filter="url(#shadow-july)">
    <!-- Side (3D Offset Layer) -->
    <g fill="url(#side-july)" stroke="url(#side-july)" transform="translate(0, 12)">
      <!-- Watermelon Rind -->
    <path d="M 156,180 C 156,280 356,280 356,180 Z" fill="#2ed573" stroke="#157a3f" stroke-width="4" />
    <path d="M 166,180 C 166,270 346,270 346,180 Z" fill="#ffffff" />
    <!-- Juicy Red Part -->
    <path d="M 174,180 C 174,260 338,260 338,180 Z" fill="url(#front-july)" />
    <!-- Seeds -->
    <circle cx="210" cy="225" r="3.5" fill="#222" />
    <circle cx="302" cy="225" r="3.5" fill="#222" />
    <circle cx="256" cy="245" r="3.5" fill="#222" />
    </g>

    <!-- Front Face Layer -->
    <g fill="url(#front-july)" stroke="url(#front-july)">
      <!-- Watermelon Rind -->
    <path d="M 156,180 C 156,280 356,280 356,180 Z" fill="#2ed573" stroke="#157a3f" stroke-width="4" />
    <path d="M 166,180 C 166,270 346,270 346,180 Z" fill="#ffffff" />
    <!-- Juicy Red Part -->
    <path d="M 174,180 C 174,260 338,260 338,180 Z" fill="url(#front-july)" />
    <!-- Seeds -->
    <circle cx="210" cy="225" r="3.5" fill="#222" />
    <circle cx="302" cy="225" r="3.5" fill="#222" />
    <circle cx="256" cy="245" r="3.5" fill="#222" />
    </g>
  </g>

  <!-- Front Limbs (Arms) -->
  <path d="M 170 190 Q 130 190 145 220" stroke="url(#front-july)" stroke-width="10" fill="none" stroke-linecap="round" />
    <path d="M 342 190 Q 382 190 367 220" stroke="url(#front-july)" stroke-width="10" fill="none" stroke-linecap="round" />

  <!-- Cute Sprout on Top -->
  <g transform="translate(256 160)">
    <path d="M0 0 Q-4 -15 -8 -24" stroke="#8B5A2B" stroke-width="5" fill="none" />
    <path d="M-8 -24 C-28 -28 -30 -5 -10 0 Z" fill="url(#leaf-july)" />
    <path d="M-8 -24 C5 -35 22 -20 5 -5 Z" fill="url(#leaf-july)" />
  </g>

  <!-- Custom Face Elements -->
  <g>
      <circle cx="232" cy="200" r="12" fill="#222" />
      <circle cx="228" cy="195" r="4" fill="#FFF" />
      <circle cx="280" cy="200" r="12" fill="#222" />
      <circle cx="276" cy="195" r="4" fill="#FFF" />
    </g>
    <ellipse cx="212" cy="215" rx="12" ry="8" fill="#FF6B81" opacity="0.45" />
    <ellipse cx="300" cy="215" rx="12" ry="8" fill="#FF6B81" opacity="0.45" />
    <path d="M240 220 Q256 235 272 220" stroke="#7A1022" stroke-width="5" fill="none" stroke-linecap="round" />

  <!-- Bottom Wooden Plank Name Banner -->
  <g filter="url(#shadow-july)">
    <!-- Plank -->
    <rect x="120" y="420" width="272" height="54" rx="10" fill="#D7A15C" stroke="#7C5730" stroke-width="4" />
    <!-- Wood grain detail lines -->
    <path d="M 130 432 Q 256 438 380 432" stroke="#9C6B30" stroke-width="2.5" fill="none" />
    <path d="M 140 460 Q 256 466 370 460" stroke="#9C6B30" stroke-width="1.5" fill="none" />
    <!-- Name Text -->
    <text x="256" y="455" 
          text-anchor="middle" 
          font-size="28" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
          fill="#7C5730">July</text>
  </g>
</svg>