<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-june" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF3E0" />
      <stop offset="100%" stop-color="#FFE0B2" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-june" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffbe76" />
      <stop offset="100%" stop-color="#ff7f50" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
    <linearGradient id="side-june" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d55e00" />
      <stop offset="100%" stop-color="#a14200" />
    </linearGradient>

    <!-- Leaf Sprout Gradient -->
    <linearGradient id="leaf-june" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7BED9F" />
      <stop offset="100%" stop-color="#2ED573" />
    </linearGradient>

    <!-- 3D Base Shadow -->
    <filter id="shadow-june">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="236" fill="url(#bg-june)" stroke="#FFCC80" stroke-width="6" />

  <!-- Premium Stitched-Sticker Dotted Inner Circle -->
  <circle cx="256" cy="256" r="216" fill="none" stroke="#ffffff" stroke-width="4" stroke-dasharray="8,8" opacity="0.4" />

  <!-- Sparkles -->
  <g fill="#FFD43B">
    <circle cx="100" cy="130" r="8" />
    <circle cx="400" cy="120" r="10" />
    <circle cx="430" cy="330" r="7" />
  </g>

  <!-- Back Limbs (Legs/Feet) -->
  <!-- Legs -->
    <rect x="230" y="300" width="16" height="35" rx="8" fill="url(#side-june)" />
    <rect x="266" y="300" width="16" height="35" rx="8" fill="url(#side-june)" />
    <ellipse cx="230" cy="330" rx="14" ry="8" fill="#2f3542" />
    <ellipse cx="276" cy="330" rx="14" ry="8" fill="#2f3542" />

  <!-- Bubbly Shape Body -->
  <g filter="url(#shadow-june)">
    <!-- Side (3D Offset Layer) -->
    <g fill="url(#side-june)" stroke="url(#side-june)" transform="translate(0, 12)">
      <!-- Cone -->
    <polygon points="256,305 216,215 296,215" fill="#d5a100" stroke="#8B5A2B" stroke-width="3" />
    <line x1="226" y1="235" x2="276" y2="285" stroke="#8B5A2B" stroke-width="1.5" />
    <line x1="286" y1="235" x2="236" y2="285" stroke="#8B5A2B" stroke-width="1.5" />
    <!-- Ice Cream Scoop -->
    <path d="M 210 205 C 190 205, 190 150, 256 150 C 322 150, 322 205, 302 205 Q 312 215 296 215 Q 286 205 256 205 Q 226 205 216 215 Z" fill="url(#front-june)" stroke="url(#side-june)" stroke-width="2" />
    <!-- Cherry -->
    <circle cx="256" cy="132" r="14" fill="#ff4757" />
    <path d="M 256 118 Q 266 100 280 95" stroke="#2f3542" stroke-width="2.5" fill="none" stroke-linecap="round" />
    </g>

    <!-- Front Face Layer -->
    <g fill="url(#front-june)" stroke="url(#front-june)">
      <!-- Cone -->
    <polygon points="256,305 216,215 296,215" fill="#d5a100" stroke="#8B5A2B" stroke-width="3" />
    <line x1="226" y1="235" x2="276" y2="285" stroke="#8B5A2B" stroke-width="1.5" />
    <line x1="286" y1="235" x2="236" y2="285" stroke="#8B5A2B" stroke-width="1.5" />
    <!-- Ice Cream Scoop -->
    <path d="M 210 205 C 190 205, 190 150, 256 150 C 322 150, 322 205, 302 205 Q 312 215 296 215 Q 286 205 256 205 Q 226 205 216 215 Z" fill="url(#front-june)" stroke="url(#side-june)" stroke-width="2" />
    <!-- Cherry -->
    <circle cx="256" cy="132" r="14" fill="#ff4757" />
    <path d="M 256 118 Q 266 100 280 95" stroke="#2f3542" stroke-width="2.5" fill="none" stroke-linecap="round" />
    </g>
  </g>

  <!-- Front Limbs (Arms) -->
  <path d="M 205 190 Q 165 200 180 230" stroke="url(#front-june)" stroke-width="10" fill="none" stroke-linecap="round" />
    <path d="M 307 190 Q 347 200 332 230" stroke="url(#front-june)" stroke-width="10" fill="none" stroke-linecap="round" />

  <!-- Cute Sprout on Top -->
  <g transform="translate(256 115)">
    <path d="M0 0 Q-4 -15 -8 -24" stroke="#8B5A2B" stroke-width="5" fill="none" />
    <path d="M-8 -24 C-28 -28 -30 -5 -10 0 Z" fill="url(#leaf-june)" />
    <path d="M-8 -24 C5 -35 22 -20 5 -5 Z" fill="url(#leaf-june)" />
  </g>

  <!-- Custom Face Elements -->
  <g>
      <circle cx="235" cy="175" r="12" fill="#222" />
      <circle cx="231" cy="170" r="4" fill="#FFF" />
      <circle cx="277" cy="175" r="12" fill="#222" />
      <circle cx="273" cy="170" r="4" fill="#FFF" />
    </g>
    <ellipse cx="215" cy="190" rx="12" ry="8" fill="#FF6B81" opacity="0.45" />
    <ellipse cx="297" cy="190" rx="12" ry="8" fill="#FF6B81" opacity="0.45" />
    <path d="M242 195 Q256 210 270 195" stroke="#7A1022" stroke-width="5" fill="none" stroke-linecap="round" />

  <!-- Bottom Wooden Plank Name Banner -->
  <g filter="url(#shadow-june)">
    <!-- Plank -->
    <rect x="120" y="420" width="272" height="54" rx="10" fill="#D7A15C" stroke="#7C5730" stroke-width="4" />
    <!-- Wood grain detail lines -->
    <path d="M 130 432 Q 256 438 380 432" stroke="#9C6B30" stroke-width="2.5" fill="none" />
    <path d="M 140 460 Q 256 466 370 460" stroke="#9C6B30" stroke-width="1.5" fill="none" />
    <!-- Name Text -->
    <text x="256" y="455" 
          text-anchor="middle" 
          font-size="28" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
          fill="#7C5730">June</text>
  </g>
</svg>