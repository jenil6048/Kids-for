<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-january" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD" />
      <stop offset="100%" stop-color="#BBDEFB" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-january" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#eceff1" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
    <linearGradient id="side-january" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#cfd8dc" />
      <stop offset="100%" stop-color="#b0bec5" />
    </linearGradient>

    <!-- Leaf Sprout Gradient -->
    <linearGradient id="leaf-january" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7BED9F" />
      <stop offset="100%" stop-color="#2ED573" />
    </linearGradient>

    <!-- 3D Base Shadow -->
    <filter id="shadow-january">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="236" fill="url(#bg-january)" stroke="#90CAF9" stroke-width="6" />

  <!-- Premium Stitched-Sticker Dotted Inner Circle -->
  <circle cx="256" cy="256" r="216" fill="none" stroke="#ffffff" stroke-width="4" stroke-dasharray="8,8" opacity="0.4" />

  <!-- Sparkles -->
  <g fill="#FFD43B">
    <circle cx="100" cy="130" r="8" />
    <circle cx="400" cy="120" r="10" />
    <circle cx="430" cy="330" r="7" />
  </g>

  <!-- Back Limbs (Legs/Feet) -->
  <!-- Twig arms -->
    <line x1="190" y1="230" x2="150" y2="210" stroke="#8B5A2B" stroke-width="6" stroke-linecap="round" />
    <line x1="322" y1="230" x2="362" y2="210" stroke="#8B5A2B" stroke-width="6" stroke-linecap="round" />
    <!-- Snow drifts at bottom -->
    <path d="M 120 320 Q 256 290 392 320 L 392 350 L 120 350 Z" fill="#ffffff" opacity="0.9" />

  <!-- Bubbly Shape Body -->
  <g filter="url(#shadow-january)">
    <!-- Side (3D Offset Layer) -->
    <g fill="url(#side-january)" stroke="url(#side-january)" transform="translate(0, 12)">
      <!-- Snowman Body -->
    <circle cx="256" cy="245" r="70" />
    <circle cx="256" cy="160" r="45" />
    <!-- Hat -->
    <rect x="230" y="100" width="52" height="8" fill="#2d3436" />
    <rect x="238" y="70" width="36" height="30" fill="#2d3436" />
    <!-- Scarf -->
    <path d="M 230 195 Q 256 215 282 195 L 290 220 L 275 225 L 270 200 Z" fill="#ff4757" />
    <!-- Carrot nose -->
    <polygon points="256,160 275,163 256,166" fill="#ff9f43" />
    </g>

    <!-- Front Face Layer -->
    <g fill="url(#front-january)" stroke="url(#front-january)">
      <!-- Snowman Body -->
    <circle cx="256" cy="245" r="70" />
    <circle cx="256" cy="160" r="45" />
    <!-- Hat -->
    <rect x="230" y="100" width="52" height="8" fill="#2d3436" />
    <rect x="238" y="70" width="36" height="30" fill="#2d3436" />
    <!-- Scarf -->
    <path d="M 230 195 Q 256 215 282 195 L 290 220 L 275 225 L 270 200 Z" fill="#ff4757" />
    <!-- Carrot nose -->
    <polygon points="256,160 275,163 256,166" fill="#ff9f43" />
    </g>
  </g>

  <!-- Front Limbs (Arms) -->
  

  <!-- Cute Sprout on Top -->
  <g transform="translate(256 70)">
    <path d="M0 0 Q-4 -15 -8 -24" stroke="#8B5A2B" stroke-width="5" fill="none" />
    <path d="M-8 -24 C-28 -28 -30 -5 -10 0 Z" fill="url(#leaf-january)" />
    <path d="M-8 -24 C5 -35 22 -20 5 -5 Z" fill="url(#leaf-january)" />
  </g>

  <!-- Custom Face Elements -->
  <!-- Custom eyes, cheeks, smile for January -->
    <g>
      <circle cx="238" cy="150" r="10" fill="#222" />
      <circle cx="234" cy="146" r="3.5" fill="#FFF" />
      <circle cx="274" cy="150" r="10" fill="#222" />
      <circle cx="270" cy="146" r="3.5" fill="#FFF" />
    </g>
    <ellipse cx="220" cy="165" rx="10" ry="6" fill="#FF6B81" opacity="0.45" />
    <ellipse cx="292" cy="165" rx="10" ry="6" fill="#FF6B81" opacity="0.45" />
    <path d="M242 170 Q256 182 270 170" stroke="#7A1022" stroke-width="5" fill="none" stroke-linecap="round" />

  <!-- Bottom Wooden Plank Name Banner -->
  <g filter="url(#shadow-january)">
    <!-- Plank -->
    <rect x="120" y="420" width="272" height="54" rx="10" fill="#D7A15C" stroke="#7C5730" stroke-width="4" />
    <!-- Wood grain detail lines -->
    <path d="M 130 432 Q 256 438 380 432" stroke="#9C6B30" stroke-width="2.5" fill="none" />
    <path d="M 140 460 Q 256 466 370 460" stroke="#9C6B30" stroke-width="1.5" fill="none" />
    <!-- Name Text -->
    <text x="256" y="455" 
          text-anchor="middle" 
          font-size="28" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
          fill="#7C5730">January</text>
  </g>
</svg>