<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fffaf9" />
      <stop offset="100%" stop-color="#fff1ef" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff9789" />
      <stop offset="100%" stop-color="#f41c00" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
    <linearGradient id="side-3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c11600" />
      <stop offset="100%" stop-color="#8e1000" />
    </linearGradient>

    <!-- Leaf Sprout Gradient -->
    <linearGradient id="leaf-3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7BED9F" />
      <stop offset="100%" stop-color="#2ED573" />
    </linearGradient>

    <!-- 3D Base Shadow -->
    <filter id="shadow-3">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="236" fill="url(#bg-3)" stroke="#eacac6" stroke-width="6" />

  <!-- Sparkles -->
  <g fill="#FFD43B">
    <circle cx="100" cy="130" r="8" />
    <circle cx="400" cy="120" r="10" />
    <circle cx="430" cy="330" r="7" />
  </g>

  <!-- Number -->
  <g filter="url(#shadow-3)">
    <!-- Side -->
    <text x="256" y="215" 
          text-anchor="middle" 
          font-size="180" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
          fill="url(#side-3)" 
          stroke="url(#side-3)" 
          stroke-width="18" 
          transform="translate(0, 12)">3</text>

    <!-- Front -->
    <text x="256" y="215" 
          text-anchor="middle" 
          font-size="180" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
          fill="url(#front-3)" 
          stroke="url(#front-3)" 
          stroke-width="18">3</text>
  </g>

  <!-- Cute Sprout -->
  <g transform="translate(256 65)">
    <path d="M0 0 Q-4 -15 -8 -24" stroke="#8B5A2B" stroke-width="5" fill="none" />
    <path d="M-8 -24 C-28 -28 -30 -5 -10 0 Z" fill="url(#leaf-3)" />
    <path d="M-8 -24 C5 -35 22 -20 5 -5 Z" fill="url(#leaf-3)" />
  </g>

  <!-- Eyes -->
  <g>
    <circle cx="215" cy="180" r="18" fill="#222" />
    <circle cx="208" cy="172" r="6" fill="#FFF" />

    <circle cx="297" cy="180" r="18" fill="#222" />
    <circle cx="290" cy="172" r="6" fill="#FFF" />
  </g>

  <!-- Cheeks -->
  <ellipse cx="185" cy="210" rx="18" ry="12" fill="#FF6B81" opacity="0.45" />
  <ellipse cx="327" cy="210" rx="18" ry="12" fill="#FF6B81" opacity="0.45" />

  <!-- Smile -->
  <path d="M225 225 Q256 255 287 225" stroke="#7A1022" stroke-width="8" fill="none" stroke-linecap="round" />

  <!-- Counting Object -->
  <g>
    <circle cx="149.3" cy="341.0" r="16.0" fill="#3498db" /><polygon points="149.3,357.0 146.3,361.0 152.3,361.0" fill="#3498db" /><path d="M 149.3 361.0 Q 145.3 371.0 149.3 381.0" stroke="#b2bec3" stroke-width="1.5" fill="none" />
<circle cx="256.0" cy="341.0" r="16.0" fill="#3498db" /><polygon points="256.0,357.0 253.0,361.0 259.0,361.0" fill="#3498db" /><path d="M 256.0 361.0 Q 252.0 371.0 256.0 381.0" stroke="#b2bec3" stroke-width="1.5" fill="none" />
<circle cx="362.7" cy="341.0" r="16.0" fill="#3498db" /><polygon points="362.7,357.0 359.7,361.0 365.7,361.0" fill="#3498db" /><path d="M 362.7 361.0 Q 358.7 371.0 362.7 381.0" stroke="#b2bec3" stroke-width="1.5" fill="none" />
  </g>

  <!-- Bottom Banner -->
  <g filter="url(#shadow-3)">
    <rect x="96" y="420" width="320" height="54" rx="27" fill="#FFF" stroke="#eacac6" stroke-width="4" />
    <text x="256" y="455" 
          text-anchor="middle" 
          font-size="28" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
          fill="#7C5730">3 - Three</text>
  </g>
</svg>