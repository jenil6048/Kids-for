  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-19" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fefff9" />
      <stop offset="100%" stop-color="#fdffef" />
    </linearGradient>

    <!-- Front Face Gradient -->
