<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fffaf9" />
      <stop offset="100%" stop-color="#fff0ef" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff8f89" />
      <stop offset="100%" stop-color="#f40c00" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
    <linearGradient id="side-2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c10900" />
      <stop offset="100%" stop-color="#8e0700" />
    </linearGradient>

    <!-- Leaf Sprout Gradient -->
    <linearGradient id="leaf-2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7BED9F" />
      <stop offset="100%" stop-color="#2ED573" />
    </linearGradient>

    <!-- 3D Base Shadow -->
    <filter id="shadow-2">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="236" fill="url(#bg-2)" stroke="#eac8c6" stroke-width="6" />

  <!-- Sparkles -->
  <g fill="#FFD43B">
    <circle cx="100" cy="130" r="8" />
    <circle cx="400" cy="120" r="10" />
    <circle cx="430" cy="330" r="7" />
  </g>

  <!-- Number -->
  <g filter="url(#shadow-2)">
    <!-- Side -->
    <text x="256" y="215" 
          text-anchor="middle" 
          font-size="180" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
          fill="url(#side-2)" 
          stroke="url(#side-2)" 
          stroke-width="18" 
          transform="translate(0, 12)">2</text>

    <!-- Front -->
    <text x="256" y="215" 
          text-anchor="middle" 
          font-size="180" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
          fill="url(#front-2)" 
          stroke="url(#front-2)" 
          stroke-width="18">2</text>
  </g>

  <!-- Cute Sprout -->
  <g transform="translate(256 65)">
    <path d="M0 0 Q-4 -15 -8 -24" stroke="#8B5A2B" stroke-width="5" fill="none" />
    <path d="M-8 -24 C-28 -28 -30 -5 -10 0 Z" fill="url(#leaf-2)" />
    <path d="M-8 -24 C5 -35 22 -20 5 -5 Z" fill="url(#leaf-2)" />
  </g>

  <!-- Eyes -->
  <g>
    <circle cx="215" cy="180" r="18" fill="#222" />
    <circle cx="208" cy="172" r="6" fill="#FFF" />

    <circle cx="297" cy="180" r="18" fill="#222" />
    <circle cx="290" cy="172" r="6" fill="#FFF" />
  </g>

  <!-- Cheeks -->
  <ellipse cx="185" cy="210" rx="18" ry="12" fill="#FF6B81" opacity="0.45" />
  <ellipse cx="327" cy="210" rx="18" ry="12" fill="#FF6B81" opacity="0.45" />

  <!-- Smile -->
  <path d="M225 225 Q256 255 287 225" stroke="#7A1022" stroke-width="8" fill="none" stroke-linecap="round" />

  <!-- Counting Object -->
  <g>
    <polygon points="201.0,325.0 206.3,337.7 220.0,338.8 209.6,347.8 212.8,361.2 201.0,354.0 189.2,361.2 192.4,347.8 182.0,338.8 195.7,337.7" fill="#FFD43B" stroke="#e67e22" stroke-width="1.2" />
<polygon points="311.0,325.0 316.3,337.7 330.0,338.8 319.6,347.8 322.8,361.2 311.0,354.0 299.2,361.2 302.4,347.8 292.0,338.8 305.7,337.7" fill="#FFD43B" stroke="#e67e22" stroke-width="1.2" />
  </g>

  <!-- Bottom Banner -->
  <g filter="url(#shadow-2)">
    <rect x="96" y="420" width="320" height="54" rx="27" fill="#FFF" stroke="#eac8c6" stroke-width="4" />
    <text x="256" y="455" 
          text-anchor="middle" 
          font-size="28" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
          fill="#7C5730">2 - Two</text>
  </g>
</svg>