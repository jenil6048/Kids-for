  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-17" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fffef9" />
      <stop offset="100%" stop-color="#fffeef" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-17" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff989" />
      <stop offset="100%" stop-color="#f4e800" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
