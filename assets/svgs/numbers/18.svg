  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-18" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fefff9" />
      <stop offset="100%" stop-color="#feffef" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-18" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fdff89" />
      <stop offset="100%" stop-color="#f0f400" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
    <linearGradient id="side-18" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#bec100" />
      <stop offset="100%" stop-color="#8c8e00" />
    </linearGradient>

    <!-- Leaf Sprout Gradient -->
    <linearGradient id="leaf-18" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7BED9F" />
      <stop offset="100%" stop-color="#2ED573" />
    </linearGradient>

    <!-- 3D Base Shadow -->
    <filter id="shadow-18">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background -->
