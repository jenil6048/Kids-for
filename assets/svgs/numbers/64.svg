  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-64" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f9fbff" />
      <stop offset="100%" stop-color="#eff3ff" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-64" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#89a5ff" />
      <stop offset="100%" stop-color="#0039f4" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
