    <rect x="96" y="420" width="320" height="54" rx="27" fill="#FFF" stroke="#eadec6" stroke-width="4" />
    <text x="256" y="455" 
          text-anchor="middle" 
          font-size="28" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
