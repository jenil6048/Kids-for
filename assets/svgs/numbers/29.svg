  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-29" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbfff9" />
      <stop offset="100%" stop-color="#f4ffef" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-29" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b0ff89" />
      <stop offset="100%" stop-color="#51f400" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
    <linearGradient id="side-29" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#40c100" />
      <stop offset="100%" stop-color="#2f8e00" />
    </linearGradient>

    <!-- Leaf Sprout Gradient -->
    <linearGradient id="leaf-29" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7BED9F" />
      <stop offset="100%" stop-color="#2ED573" />
    </linearGradient>

    <!-- 3D Base Shadow -->
    <filter id="shadow-29">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

