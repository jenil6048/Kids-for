<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-44" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f9fffc" />
      <stop offset="100%" stop-color="#effff8" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-44" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#89ffcc" />
      <stop offset="100%" stop-color="#00f48a" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
    <linearGradient id="side-44" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00c16d" />
      <stop offset="100%" stop-color="#008e50" />
    </linearGradient>

    <!-- Leaf Sprout Gradient -->
    <linearGradient id="leaf-44" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7BED9F" />
      <stop offset="100%" stop-color="#2ED573" />
    </linearGradient>

    <!-- 3D Base Shadow -->
    <filter id="shadow-44">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background -->
