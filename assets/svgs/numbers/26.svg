<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-26" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcfff9" />
      <stop offset="100%" stop-color="#f7ffef" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-26" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4ff89" />
      <stop offset="100%" stop-color="#7af400" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
    <linearGradient id="side-26" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60c100" />
      <stop offset="100%" stop-color="#478e00" />
    </linearGradient>

    <!-- Leaf Sprout Gradient -->
    <linearGradient id="leaf-26" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7BED9F" />
      <stop offset="100%" stop-color="#2ED573" />
    </linearGradient>

    <!-- 3D Base Shadow -->
    <filter id="shadow-26">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="236" fill="url(#bg-26)" stroke="#d8eac6" stroke-width="6" />

