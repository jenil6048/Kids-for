<circle cx="338.5" cy="372.5" r="20.0" fill="#f1c40f" stroke="#e67e22" stroke-width="1.2" /><circle cx="338.5" cy="372.5" r="14.0" fill="none" stroke="#f39c12" stroke-width="1.2" stroke-dasharray="1.5,1.5" /><polygon points="338.5,365.5 340.5,370.5 345.5,370.5 341.5,374.5 343.5,379.5 338.5,376.5 333.5,379.5 335.5,374.5 331.5,370.5 336.5,370.5" fill="#ffffff" />
  </g>

  <!-- Bottom Banner -->
  <g filter="url(#shadow-8)">
    <rect x="96" y="420" width="320" height="54" rx="27" fill="#FFF" stroke="#ead5c6" stroke-width="4" />
    <text x="256" y="455" 
          text-anchor="middle" 
          font-size="28" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
          fill="#7C5730">8 - Eight</text>
  </g>
</svg>