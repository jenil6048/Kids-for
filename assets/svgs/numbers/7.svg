<circle cx="228.5" cy="363.5" r="8.0" fill="#ffbe76" /><circle cx="237.1" cy="369.7" r="8.0" fill="#ffbe76" /><circle cx="233.8" cy="379.8" r="8.0" fill="#ffbe76" /><circle cx="223.2" cy="379.8" r="8.0" fill="#ffbe76" /><circle cx="219.9" cy="369.7" r="8.0" fill="#ffbe76" /><circle cx="228.5" cy="372.5" r="7.0" fill="#f1c40f" />
<circle cx="283.5" cy="363.5" r="8.0" fill="#ffbe76" /><circle cx="292.1" cy="369.7" r="8.0" fill="#ffbe76" /><circle cx="288.8" cy="379.8" r="8.0" fill="#ffbe76" /><circle cx="278.2" cy="379.8" r="8.0" fill="#ffbe76" /><circle cx="274.9" cy="369.7" r="8.0" fill="#ffbe76" /><circle cx="283.5" cy="372.5" r="7.0" fill="#f1c40f" />
  </g>

  <!-- Bottom Banner -->
  <g filter="url(#shadow-7)">
    <rect x="96" y="420" width="320" height="54" rx="27" fill="#FFF" stroke="#ead3c6" stroke-width="4" />
    <text x="256" y="455" 
          text-anchor="middle" 
          font-size="28" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
