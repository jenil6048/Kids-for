<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-82" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef9ff" />
      <stop offset="100%" stop-color="#fcefff" />
    </linearGradient>

    <!-- Front Face Gradient -->
