  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-21" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fdfff9" />
      <stop offset="100%" stop-color="#fbffef" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-21" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e7ff89" />
      <stop offset="100%" stop-color="#c3f400" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
    <linearGradient id="side-21" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9bc100" />
      <stop offset="100%" stop-color="#728e00" />
    </linearGradient>

    <!-- Leaf Sprout Gradient -->
