  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-45" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f9fffd" />
      <stop offset="100%" stop-color="#effff9" />
    </linearGradient>

    <!-- Front Face Gradient -->
