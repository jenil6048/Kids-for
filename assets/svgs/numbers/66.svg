    <path d="M0 0 Q-4 -15 -8 -24" stroke="#8B5A2B" stroke-width="5" fill="none" />
    <path d="M-8 -24 C-28 -28 -30 -5 -10 0 Z" fill="url(#leaf-66)" />
    <path d="M-8 -24 C5 -35 22 -20 5 -5 Z" fill="url(#leaf-66)" />
  </g>

  <!-- Eyes -->
