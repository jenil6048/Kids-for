    <!-- Side -->
    <text x="256" y="215" 
          text-anchor="middle" 
          font-size="180" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
          fill="url(#side-66)" 
          stroke="url(#side-66)" 
          stroke-width="18" 
          transform="translate(0, 12)">66</text>

    <!-- Front -->
    <text x="256" y="215" 
          text-anchor="middle" 
          font-size="180" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
          fill="url(#front-66)" 
          stroke="url(#front-66)" 
          stroke-width="18">66</text>
  </g>

  <!-- Cute Sprout -->
