<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-66" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f9faff" />
      <stop offset="100%" stop-color="#eff1ff" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-66" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8995ff" />
      <stop offset="100%" stop-color="#0018f4" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
    <linearGradient id="side-66" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0013c1" />
      <stop offset="100%" stop-color="#000e8e" />
    </linearGradient>

    <!-- Leaf Sprout Gradient -->
    <linearGradient id="leaf-66" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7BED9F" />
      <stop offset="100%" stop-color="#2ED573" />
    </linearGradient>

    <!-- 3D Base Shadow -->
    <filter id="shadow-66">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="236" fill="url(#bg-66)" stroke="#c6caea" stroke-width="6" />

  <!-- Sparkles -->
  <g fill="#FFD43B">
    <circle cx="100" cy="130" r="8" />
    <circle cx="400" cy="120" r="10" />
    <circle cx="430" cy="330" r="7" />
  </g>

  <!-- Number -->
