<circle cx="249.0" cy="324.5" r="9.0" fill="#d63031" /><circle cx="263.0" cy="324.5" r="9.0" fill="#d63031" /><path d="M 249.0 324.5 Q 256.0 307.5 256.0 303.5 Q 256.0 307.5 263.0 324.5" stroke="#8B5A2B" stroke-width="1.5" fill="none" stroke-linecap="round" />
<circle cx="304.0" cy="324.5" r="9.0" fill="#d63031" /><circle cx="318.0" cy="324.5" r="9.0" fill="#d63031" /><path d="M 304.0 324.5 Q 311.0 307.5 311.0 303.5 Q 311.0 307.5 318.0 324.5" stroke="#8B5A2B" stroke-width="1.5" fill="none" stroke-linecap="round" />
<circle cx="359.0" cy="324.5" r="9.0" fill="#d63031" /><circle cx="373.0" cy="324.5" r="9.0" fill="#d63031" /><path d="M 359.0 324.5 Q 366.0 307.5 366.0 303.5 Q 366.0 307.5 373.0 324.5" stroke="#8B5A2B" stroke-width="1.5" fill="none" stroke-linecap="round" />
<circle cx="139.0" cy="379.5" r="9.0" fill="#d63031" /><circle cx="153.0" cy="379.5" r="9.0" fill="#d63031" /><path d="M 139.0 379.5 Q 146.0 362.5 146.0 358.5 Q 146.0 362.5 153.0 379.5" stroke="#8B5A2B" stroke-width="1.5" fill="none" stroke-linecap="round" />
<circle cx="194.0" cy="379.5" r="9.0" fill="#d63031" /><circle cx="208.0" cy="379.5" r="9.0" fill="#d63031" /><path d="M 194.0 379.5 Q 201.0 362.5 201.0 358.5 Q 201.0 362.5 208.0 379.5" stroke="#8B5A2B" stroke-width="1.5" fill="none" stroke-linecap="round" />
<circle cx="249.0" cy="379.5" r="9.0" fill="#d63031" /><circle cx="263.0" cy="379.5" r="9.0" fill="#d63031" /><path d="M 249.0 379.5 Q 256.0 362.5 256.0 358.5 Q 256.0 362.5 263.0 379.5" stroke="#8B5A2B" stroke-width="1.5" fill="none" stroke-linecap="round" />
<circle cx="304.0" cy="379.5" r="9.0" fill="#d63031" /><circle cx="318.0" cy="379.5" r="9.0" fill="#d63031" /><path d="M 304.0 379.5 Q 311.0 362.5 311.0 358.5 Q 311.0 362.5 318.0 379.5" stroke="#8B5A2B" stroke-width="1.5" fill="none" stroke-linecap="round" />
  </g>

  <!-- Bottom Banner -->
  <g filter="url(#shadow-9)">
    <rect x="96" y="420" width="320" height="54" rx="27" fill="#FFF" stroke="#ead7c6" stroke-width="4" />
    <text x="256" y="455" 
          text-anchor="middle" 
          font-size="28" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
          fill="#7C5730">9 - Nine</text>
  </g>
</svg>