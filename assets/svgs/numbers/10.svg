<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-10" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fffcf9" />
      <stop offset="100%" stop-color="#fff7ef" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-10" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffc889" />
      <stop offset="100%" stop-color="#f48200" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
    <linearGradient id="side-10" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c16700" />
      <stop offset="100%" stop-color="#8e4c00" />
    </linearGradient>

    <!-- Leaf Sprout Gradient -->
    <linearGradient id="leaf-10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7BED9F" />
      <stop offset="100%" stop-color="#2ED573" />
    </linearGradient>

    <!-- 3D Base Shadow -->
    <filter id="shadow-10">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="236" fill="url(#bg-10)" stroke="#ead9c6" stroke-width="6" />

  <!-- Sparkles -->
  <g fill="#FFD43B">
    <circle cx="100" cy="130" r="8" />
    <circle cx="400" cy="120" r="10" />
    <circle cx="430" cy="330" r="7" />
  </g>

  <!-- Number -->
  <g filter="url(#shadow-10)">
    <!-- Side -->
    <text x="256" y="215" 
          text-anchor="middle" 
          font-size="180" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
          fill="url(#side-10)" 
          stroke="url(#side-10)" 
          stroke-width="18" 
          transform="translate(0, 12)">10</text>

    <!-- Front -->
    <text x="256" y="215" 
          text-anchor="middle" 
