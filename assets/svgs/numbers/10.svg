          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
          fill="url(#front-10)" 
          stroke="url(#front-10)" 
          stroke-width="18">10</text>
  </g>

  <!-- Cute Sprout -->
