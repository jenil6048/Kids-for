<circle cx="347.4" cy="364.0" r="15.4" fill="#3498db" /><polygon points="347.4,379.4 344.5,383.2 350.3,383.2" fill="#3498db" /><path d="M 347.4 383.2 Q 343.6 392.8 347.4 402.4" stroke="#b2bec3" stroke-width="1.5" fill="none" />
  </g>

  <!-- Bottom Banner -->
  <g filter="url(#shadow-13)">
    <rect x="96" y="420" width="320" height="54" rx="27" fill="#FFF" stroke="#eae0c6" stroke-width="4" />
    <text x="256" y="455" 
