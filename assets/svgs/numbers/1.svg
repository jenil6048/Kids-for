<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF8F8"/>
      <stop offset="100%" stop-color="#FFEFEF"/>
    </linearGradient>

    <linearGradient id="front" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF8B8B"/>
      <stop offset="100%" stop-color="#F50000"/>
    </linearGradient>

    <linearGradient id="side" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C40000"/>
      <stop offset="100%" stop-color="#8D0000"/>
    </linearGradient>

    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7BED9F"/>
      <stop offset="100%" stop-color="#2ED573"/>
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="8"
          flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="236"
      fill="url(#bg)"
      stroke="#EBC5C5"
      stroke-width="6"/>

  <!-- Sparkles -->
  <g fill="#FFD43B">
    <circle cx="100" cy="130" r="8"/>
    <circle cx="400" cy="120" r="10"/>
    <circle cx="430" cy="330" r="7"/>
  </g>

  <!-- Number -->
  <g filter="url(#shadow)">

    <!-- Side -->
    <text
        x="256"
        y="215"
        text-anchor="middle"
        font-size="180"
        font-weight="900"
        font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif"
        fill="url(#side)"
        stroke="url(#side)"
        stroke-width="18"
        transform="translate(0,12)">1</text>

    <!-- Front -->
    <text
        x="256"
        y="215"
        text-anchor="middle"
        font-size="180"
        font-weight="900"
        font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif"
        fill="url(#front)"
        stroke="url(#front)"
        stroke-width="18">1</text>

  </g>

  <!-- Cute Sprout -->
  <g transform="translate(256 65)">
    <path d="M0 0 Q-4 -15 -8 -24"
        stroke="#8B5A2B"
        stroke-width="5"
        fill="none"/>
    <path d="M-8 -24 C-28 -28 -30 -5 -10 0 Z"
        fill="url(#leaf)"/>
    <path d="M-8 -24 C5 -35 22 -20 5 -5 Z"
        fill="url(#leaf)"/>
  </g>

  <!-- Eyes -->
  <g>
    <circle cx="215" cy="180" r="18" fill="#222"/>
    <circle cx="208" cy="172" r="6" fill="#FFF"/>

    <circle cx="297" cy="180" r="18" fill="#222"/>
    <circle cx="290" cy="172" r="6" fill="#FFF"/>
  </g>

  <!-- Cheeks -->
  <ellipse cx="185" cy="210" rx="18" ry="12"
      fill="#FF6B81" opacity="0.45"/>

  <ellipse cx="327" cy="210" rx="18" ry="12"
      fill="#FF6B81" opacity="0.45"/>

  <!-- Smile -->
  <path
      d="M225 225 Q256 255 287 225"
      stroke="#7A1022"
      stroke-width="8"
      fill="none"
      stroke-linecap="round"/>

  <!-- Counting Object -->
  <g>
    <circle cx="256" cy="345" r="20" fill="#FF4757"/>
    <path d="M256 325 Q262 315 266 310"
        stroke="#8B5A2B"
        stroke-width="3"
        fill="none"/>
    <path d="M255 326 C244 318 240 320 247 330 Z"
        fill="#2ED573"/>
  </g>

  <!-- Bottom Banner -->
  <g filter="url(#shadow)">
    <rect
        x="96"
        y="420"
        width="320"
        height="54"
        rx="27"
        fill="#FFF"
        stroke="#EBC5C5"
        stroke-width="4"/>

    <text
        x="256"
        y="455"
        text-anchor="middle"
        font-size="28"
        font-weight="900"
        font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif"
        fill="#7C5730">
      1 - One
    </text>
  </g>

</svg>