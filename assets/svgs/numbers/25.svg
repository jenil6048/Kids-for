  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-25" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcfff9" />
      <stop offset="100%" stop-color="#f8ffef" />
    </linearGradient>

    <!-- Front Face Gradient -->
