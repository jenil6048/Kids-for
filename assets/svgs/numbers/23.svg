  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-23" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fdfff9" />
      <stop offset="100%" stop-color="#faffef" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-23" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d9ff89" />
      <stop offset="100%" stop-color="#a7f400" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
    <linearGradient id="side-23" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#84c100" />
      <stop offset="100%" stop-color="#618e00" />
    </linearGradient>

    <!-- Leaf Sprout Gradient -->
    <linearGradient id="leaf-23" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7BED9F" />
      <stop offset="100%" stop-color="#2ED573" />
    </linearGradient>

    <!-- 3D Base Shadow -->
    <filter id="shadow-23">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

