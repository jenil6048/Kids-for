  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-22" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fdfff9" />
      <stop offset="100%" stop-color="#fbffef" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-22" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e1ff89" />
      <stop offset="100%" stop-color="#b7f400" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
