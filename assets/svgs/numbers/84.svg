  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-84" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef9ff" />
      <stop offset="100%" stop-color="#feefff" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-84" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fb89ff" />
      <stop offset="100%" stop-color="#ec00f4" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
