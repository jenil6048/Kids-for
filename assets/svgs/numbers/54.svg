  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-54" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f9feff" />
      <stop offset="100%" stop-color="#effcff" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-54" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#89ebff" />
      <stop offset="100%" stop-color="#00cbf4" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
    <linearGradient id="side-54" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00a1c1" />
      <stop offset="100%" stop-color="#00768e" />
    </linearGradient>

    <!-- Leaf Sprout Gradient -->
    <linearGradient id="leaf-54" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7BED9F" />
      <stop offset="100%" stop-color="#2ED573" />
    </linearGradient>

    <!-- 3D Base Shadow -->
    <filter id="shadow-54">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

