<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fffbf9" />
      <stop offset="100%" stop-color="#fff4ef" />
    </linearGradient>

    <!-- Front Face Gradient -->
    <linearGradient id="front-6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffac89" />
      <stop offset="100%" stop-color="#f44900" />
    </linearGradient>

    <!-- 3D Side/Extrusion Color -->
    <linearGradient id="side-6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c13a00" />
      <stop offset="100%" stop-color="#8e2a00" />
    </linearGradient>

    <!-- Leaf Sprout Gradient -->
    <linearGradient id="leaf-6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7BED9F" />
      <stop offset="100%" stop-color="#2ED573" />
    </linearGradient>

    <!-- 3D Base Shadow -->
    <filter id="shadow-6">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="236" fill="url(#bg-6)" stroke="#ead1c6" stroke-width="6" />

  <!-- Sparkles -->
  <g fill="#FFD43B">
    <circle cx="100" cy="130" r="8" />
    <circle cx="400" cy="120" r="10" />
    <circle cx="430" cy="330" r="7" />
  </g>

  <!-- Number -->
  <g filter="url(#shadow-6)">
    <!-- Side -->
    <text x="256" y="215" 
          text-anchor="middle" 
          font-size="180" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
          fill="url(#side-6)" 
          stroke="url(#side-6)" 
          stroke-width="18" 
          transform="translate(0, 12)">6</text>

    <!-- Front -->
    <text x="256" y="215" 
          text-anchor="middle" 
          font-size="180" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
          fill="url(#front-6)" 
          stroke="url(#front-6)" 
          stroke-width="18">6</text>
  </g>

  <!-- Cute Sprout -->
  <g transform="translate(256 65)">
    <path d="M0 0 Q-4 -15 -8 -24" stroke="#8B5A2B" stroke-width="5" fill="none" />
    <path d="M-8 -24 C-28 -28 -30 -5 -10 0 Z" fill="url(#leaf-6)" />
    <path d="M-8 -24 C5 -35 22 -20 5 -5 Z" fill="url(#leaf-6)" />
  </g>

  <!-- Eyes -->
  <g>
    <circle cx="215" cy="180" r="18" fill="#222" />
    <circle cx="208" cy="172" r="6" fill="#FFF" />

    <circle cx="297" cy="180" r="18" fill="#222" />
    <circle cx="290" cy="172" r="6" fill="#FFF" />
  </g>

  <!-- Cheeks -->
  <ellipse cx="185" cy="210" rx="18" ry="12" fill="#FF6B81" opacity="0.45" />
  <ellipse cx="327" cy="210" rx="18" ry="12" fill="#FF6B81" opacity="0.45" />

  <!-- Smile -->
  <path d="M225 225 Q256 255 287 225" stroke="#7A1022" stroke-width="8" fill="none" stroke-linecap="round" />

  <!-- Counting Object -->
  <g>
    <polygon points="201.0,317.5 181.0,307.5 181.0,327.5" fill="#a29bfe" /><polygon points="201.0,317.5 221.0,307.5 221.0,327.5" fill="#a29bfe" /><circle cx="201.0" cy="317.5" r="14.0" fill="#fd79a8" stroke="#ffffff" stroke-width="1.0" />
<polygon points="256.0,317.5 236.0,307.5 236.0,327.5" fill="#a29bfe" /><polygon points="256.0,317.5 276.0,307.5 276.0,327.5" fill="#a29bfe" /><circle cx="256.0" cy="317.5" r="14.0" fill="#fd79a8" stroke="#ffffff" stroke-width="1.0" />
<polygon points="311.0,317.5 291.0,307.5 291.0,327.5" fill="#a29bfe" /><polygon points="311.0,317.5 331.0,307.5 331.0,327.5" fill="#a29bfe" /><circle cx="311.0" cy="317.5" r="14.0" fill="#fd79a8" stroke="#ffffff" stroke-width="1.0" />
<polygon points="201.0,372.5 181.0,362.5 181.0,382.5" fill="#a29bfe" /><polygon points="201.0,372.5 221.0,362.5 221.0,382.5" fill="#a29bfe" /><circle cx="201.0" cy="372.5" r="14.0" fill="#fd79a8" stroke="#ffffff" stroke-width="1.0" />
<polygon points="256.0,372.5 236.0,362.5 236.0,382.5" fill="#a29bfe" /><polygon points="256.0,372.5 276.0,362.5 276.0,382.5" fill="#a29bfe" /><circle cx="256.0" cy="372.5" r="14.0" fill="#fd79a8" stroke="#ffffff" stroke-width="1.0" />
<polygon points="311.0,372.5 291.0,362.5 291.0,382.5" fill="#a29bfe" /><polygon points="311.0,372.5 331.0,362.5 331.0,382.5" fill="#a29bfe" /><circle cx="311.0" cy="372.5" r="14.0" fill="#fd79a8" stroke="#ffffff" stroke-width="1.0" />
  </g>

  <!-- Bottom Banner -->
  <g filter="url(#shadow-6)">
    <rect x="96" y="420" width="320" height="54" rx="27" fill="#FFF" stroke="#ead1c6" stroke-width="4" />
    <text x="256" y="455" 
          text-anchor="middle" 
          font-size="28" 
          font-weight="900" 
          font-family="Comic Sans MS, Arial Rounded MT Bold, sans-serif" 
          fill="#7C5730">6 - Six</text>
  </g>
</svg>